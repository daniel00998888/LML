<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN | LA MELY TV</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: 'Montserrat', sans-serif; padding: 20px; }
        header { text-align: center; margin-bottom: 30px; padding: 20px; border-bottom: 2px solid #d4af37; }
        header h1 { font-family: 'Oswald'; color: #d4af37; text-transform: uppercase; letter-spacing: 2px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #151515; border-radius: 15px; overflow: hidden; border: 1px solid #333; display: flex; flex-direction: column; }
        
        .media-box { width: 100%; height: 250px; background: #000; }
        .media-box video, .media-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .info { padding: 15px; flex-grow: 1; }
        .info h3 { color: #d4af37; margin-bottom: 5px; font-family: 'Oswald'; }
        .info p { font-size: 0.9rem; color: #ccc; }

        .btns { display: flex; padding: 10px; gap: 10px; background: #202020; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-ok { background: #28a745; color: #fff; }
        .btn-ok:hover { background: #218838; }
        .btn-no { background: #dc3545; color: #fff; }
        .btn-no:hover { background: #c82333; }

        #msg-vacio { text-align: center; padding: 50px; color: #666; font-size: 1.2rem; }
    </style>
</head>
<body>

<header>
    <h1>Panel de Administración - LA MELY</h1>
</header>

<div id="msg-vacio" style="display:none;">No hay publicaciones pendientes, bro. 🔥</div>
<div class="grid" id="container"></div>

<script>
    // CONFIGURACIÓN (Verifica que tus claves sean estas)
    const SB_URL = 'https://meiwuluwrdjszxeyoqtt.supabase.co';
    const SB_KEY = 'sb_publishable_gZgGIamNJqf8ir8vvt1OTw_bJ-rosi4';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    async function cargarPendientes() {
        const container = document.getElementById('container');
        const msg = document.getElementById('msg-vacio');
        container.innerHTML = "<p>Cargando contenido...</p>";

        // 1. Pedimos los datos incluyendo explicitamente el ID
        const { data, error } = await _supabase
            .from('publicaciones')
            .select('*') // Esto trae todas las columnas, incluyendo 'id'
            .eq('estado', 'pendiente')
            .order('created_at', { ascending: false });

        if (error) {
            console.error("Error Supabase:", error);
            container.innerHTML = "<p>Error al cargar datos. Revisa la consola.</p>";
            return;
        }

        if (data.length === 0) {
            container.innerHTML = "";
            msg.style.display = "block";
            return;
        }

        msg.style.display = "none";
        container.innerHTML = "";

        data.forEach(post => {
            // DEBUG: Esto te dirá en la consola si el ID existe realmente
            console.log("Revisando post:", post.id, post.usuario);

            const card = document.createElement('div');
            card.className = 'card';
            
            // Verificamos si post.id existe, si no, usamos un aviso
            const currentID = post.id;

            card.innerHTML = `
                <div class="media-box">
                    ${post.tipo === 'video' 
                        ? `<video src="${post.url}" controls></video>` 
                        : `<img src="${post.url}">`}
                </div>
                <div class="info">
                    <h3>@${post.usuario || 'Anónimo'}</h3>
                    <p>${post.descripcion || 'Sin descripción...'}</p>
                    <small style="color:#555">ID: ${currentID}</small>
                </div>
                <div class="btns">
                    <button class="btn-ok" onclick="cambiarEstado('${currentID}', 'aprobado')">Aprobar</button>
                    <button class="btn-no" onclick="eliminarPost('${currentID}')">Eliminar</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // FUNCION PARA APROBAR (PATCH)
    async function cambiarEstado(idRecibido, nuevoEstado) {
        if (!idRecibido || idRecibido === 'undefined' || idRecibido === 'null') {
            alert("Error: Esta publicación no tiene un ID válido en la base de datos.");
            return;
        }

        const { error } = await _supabase
            .from('publicaciones')
            .update({ estado: nuevoEstado })
            .eq('id', idRecibido); // Aquí es donde fallaba antes

        if (error) {
            alert("Error al actualizar: " + error.message);
        } else {
            alert("¡Publicación aprobada!");
            cargarPendientes();
        }
    }

    // FUNCION PARA BORRAR (DELETE)
    async function eliminarPost(idRecibido) {
        if (!idRecibido || idRecibido === 'undefined') return;

        const confirmar = confirm("¿Seguro que quieres borrar esto?");
        if (!confirmar) return;

        const { error } = await _supabase
            .from('publicaciones')
            .delete()
            .eq('id', idRecibido);

        if (error) {
            alert("Error al borrar: " + error.message);
        } else {
            alert("Publicación eliminada.");
            cargarPendientes();
        }
    }

    // Arrancar la carga
    cargarPendientes();
</script>

</body>
</html>
