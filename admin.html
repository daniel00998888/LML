<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ADMIN | LA MELY</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #2a2a2a; padding: 15px; border-radius: 10px; border: 1px solid #d4af37; }
        video, img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; }
        .btns { display: flex; justify-content: space-between; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-approve { background: #28a745; color: white; }
        .btn-reject { background: #dc3545; color: white; }
    </style>
</head>
<body>
    <h1>Panel de Control - Pendientes</h1>
    <div class="grid" id="admin-grid"></div>

    <script>
        const SB_URL = 'https://meiwuluwrdjszxeyoqtt.supabase.co';
        const SB_KEY = 'sb_publishable_gZgGIamNJqf8ir8vvt1OTw_bJ-rosi4';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function loadPending() {
            const grid = document.getElementById('admin-grid');
            grid.innerHTML = '';
            const { data } = await _supabase.from('publicaciones').select('*').eq('estado', 'pendiente');

            data.forEach(post => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    ${post.tipo === 'video' ? `<video src="${post.url}" muted></video>` : `<img src="${post.url}">`}
                    <p><strong>@${post.usuario}</strong></p>
                    <div class="btns">
                        <button class="btn-approve" onclick="updatePost(${post.id}, 'aprobado')">APROBAR</button>
                        <button class="btn-reject" onclick="deletePost(${post.id})">RECHAZAR</button>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        async function updatePost(id, nuevoEstado) {
            await _supabase.from('publicaciones').update({ estado: nuevoEstado }).eq('id', id);
            alert("¡Publicación Aprobada!");
            loadPending();
        }

        async function deletePost(id) {
            if(confirm("¿Seguro que quieres borrarlo?")) {
                await _supabase.from('publicaciones').delete().eq('id', id);
                loadPending();
            }
        }

        loadPending();
    </script>
</body>
</html>
