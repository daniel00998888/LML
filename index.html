<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA MELY </title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Montserrat', sans-serif; }

        /* Contenedor tipo App */
        #feed {
            width: 100%; height: 100vh;
            overflow-y: scroll;
            snap-type: y mandatory;
            scrollbar-width: none;
        }
        #feed::-webkit-scrollbar { display: none; }

        .post-card {
            width: 100%; height: 100vh;
            snap-align: start;
            position: relative;
            background: #000;
            display: flex; align-items: center; justify-content: center;
        }

        .media-content { width: 100%; height: 100%; object-fit: cover; }

        /* Capa de diseño TikTok */
        .ui-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 40%, transparent 100%);
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 20px; pointer-events: none;
        }

        .post-info { margin-bottom: 20px; max-width: 80%; }
        .post-info h2 { font-family: 'Oswald'; color: #d4af37; font-size: 1.5rem; margin-bottom: 5px; }
        .post-info p { font-size: 0.9rem; color: #eee; }

        /* Barra Lateral de Acciones */
        .side-bar {
            position: absolute; right: 15px; bottom: 100px;
            display: flex; flex-direction: column; gap: 20px;
            align-items: center; pointer-events: auto;
        }
        .action-item { text-align: center; cursor: pointer; }
        .action-item i { font-size: 28px; color: #fff; margin-bottom: 5px; transition: 0.3s; }
        .action-item i:active { transform: scale(1.2); color: #d4af37; }
        .action-item span { font-size: 12px; display: block; }

        header {
            position: fixed; top: 0; width: 100%; padding: 20px;
            text-align: center; z-index: 100; font-family: 'Oswald';
            letter-spacing: 3px; color: rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>
    <header>SIGUIENDO | <strong>PARA TI</strong></header>
    <div id="feed"></div>

    <script>
        const SB_URL = 'https://meiwuluwrdjszxeyoqtt.supabase.co';
        const SB_KEY = 'sb_publishable_gZgGIamNJqf8ir8vvt1OTw_bJ-rosi4';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function loadFeed() {
            const container = document.getElementById('feed');
            const { data } = await _supabase.from('publicaciones').select('*').eq('estado', 'aprobado').order('created_at', { ascending: false });

            data.forEach(post => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    ${post.tipo === 'video' ? `<video class="media-content" src="${post.url}" loop muted playsinline></video>` : `<img class="media-content" src="${post.url}">`}
                    <div class="ui-overlay">
                        <div class="post-info">
                            <h2>@${post.usuario}</h2>
                            <p>${post.descripcion}</p>
                        </div>
                    </div>
                    <div class="side-bar">
                        <div class="action-item"><i class="fas fa-heart"></i><span>Mely</span></div>
                        <div class="action-item"><i class="fas fa-comment"></i><span>Respeto</span></div>
                        <div class="action-item"><i class="fas fa-share"></i><span>Enviar</span></div>
                    </div>
                `;
                container.appendChild(card);
            });
            initVideos();
        }

        function initVideos() {
            const vids = document.querySelectorAll('video');
            const obs = new IntersectionObserver(e => e.forEach(i => i.isIntersecting ? i.target.play() : i.target.pause()), { threshold: 0.6 });
            vids.forEach(v => obs.observe(v));
        }
        loadFeed();
    </script>
</body>
</html>
