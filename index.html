<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA MELY | TV</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Montserrat', sans-serif; }
        #app-viewport { width: 100%; height: calc(100dvh - 65px); position: relative; overflow: hidden; }
        #feed-screen { width: 100%; height: 100%; display: block; }
        #feed-container { width: 100%; height: 100%; overflow-y: scroll; snap-type: y mandatory; scroll-behavior: smooth; scrollbar-width: none; overscroll-behavior-y: contain; }
        #feed-container::-webkit-scrollbar { display: none; }
        .post-card { width: 100%; height: 100%; snap-align: start; snap-stop: always; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        .video-player { width: 100%; height: 100%; object-fit: cover; }
        .ui-info { position: absolute; bottom: 40px; left: 15px; z-index: 10; text-shadow: 2px 2px 8px rgba(0,0,0,1); max-width: 70%; }
        .ui-info h2 { font-family: 'Oswald'; color: #d4af37; font-size: 1.4rem; margin-bottom: 5px; cursor: pointer; display: inline-block; }
        .side-actions { position: absolute; right: 10px; bottom: 80px; display: flex; flex-direction: column; align-items: center; gap: 18px; z-index: 20; }
        .action-item { display: flex; flex-direction: column; align-items: center; color: #fff; font-size: 0.75rem; font-weight: bold; }
        .action-btn { background: none; border: none; color: #fff; font-size: 2.2rem; cursor: pointer; transition: 0.2s; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5)); }
        .action-btn.active { color: #ff0050 !important; transform: scale(1.1); }
        .user-avatar-btn { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; overflow: hidden; background: #333; margin-bottom: 5px; cursor: pointer; position: relative; }
        .user-avatar-btn img { width: 100%; height: 100%; object-fit: cover; }
        .user-avatar-btn::after { content: '+'; position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%); background: #ff0050; color: #fff; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; border: 1px solid #000; }
        .btn-delete { color: #ff4444 !important; font-size: 1.8rem !important; margin-top: 5px; opacity: 0.8; }
        .progress-container { position: absolute; bottom: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.1); z-index: 20; }
        .progress-bar { height: 100%; background: #d4af37; width: 0%; }
        
        /* NAVBAR ACTUALIZADA */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { text-align: center; color: #888; font-size: 10px; cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 1.3rem; display: block; margin-bottom: 3px; }
        
        .plus-btn { width: 42px; height: 28px; background: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; position: relative; margin: 0 auto; }
        .plus-btn::before { content:''; position:absolute; left:-3px; width:100%; height:100%; background:#20f3ea; border-radius:8px; z-index:-1; }
        .plus-btn::after { content:''; position:absolute; right:-3px; width:100%; height:100%; background:#ff0050; border-radius:8px; z-index:-1; }
        
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; background: #000; z-index: 1500; overflow-y: auto; }
        
        /* ESTILOS DE BUSQUEDA Y NOTIFICACIONES */
        .search-bar { padding: 15px; background: #111; display: flex; gap: 10px; position: sticky; top: 0; z-index: 10; }
        .search-bar input { flex: 1; background: #222; border: none; padding: 12px; border-radius: 8px; color: #fff; outline: none; }
        .user-row { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid #111; cursor: pointer; }
        .user-row img { width: 45px; height: 45px; border-radius: 50%; margin-right: 15px; }
        
        .notif-row { display: flex; align-items: flex-start; padding: 15px; border-bottom: 1px solid #111; gap: 12px; }
        .notif-row img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .notif-content { flex: 1; font-size: 0.9rem; }
        .notif-time { font-size: 0.7rem; color: #555; margin-top: 4px; }
        .notif-thumb { width: 40px; height: 55px; background: #222; border-radius: 4px; object-fit: cover; }

        /* [RESTO DE ESTILOS MANTENIDOS] */
        .profile-header { padding: 30px 20px; text-align: center; background: #000; position: relative; }
        .btn-back { position: absolute; top: 20px; left: 20px; font-size: 1.5rem; color: #fff; background: none; border: none; cursor: pointer; }
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .grid-item { aspect-ratio: 9/16; background: #111; position: relative; overflow: hidden; cursor: pointer; }
        .grid-item video, .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        #viewer-modal { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; }
        .viewer-close { position: absolute; top: 20px; left: 20px; font-size: 2rem; z-index: 3100; color: #fff; cursor: pointer; }
        #loading { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 4000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div style="border:4px solid #d4af37; border-top:4px solid transparent; width:50px; height:50px; border-radius:50%; animation:spin 1s linear infinite"></div>
        <p style="margin-top:15px; color:#d4af37; font-weight:bold;">CARGANDO...</p>
    </div>

    <!-- AUTH -->
    <div id="auth-screen" class="screen" style="display:flex; align-items:center; justify-content:center; z-index:9000;">
        <div style="font-family:'Oswald'; font-size:3.5rem; color:#d4af37; margin-bottom:20px; letter-spacing:5px;">LA MELY</div>
        <div id="login-form" style="width:85%; max-width:350px; text-align:center;">
            <input type="email" id="email" placeholder="Correo" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:10px;">
            <input type="password" id="pass" placeholder="Contraseña" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:15px;">
            <button onclick="handleAuth('login')" style="width:100%; padding:16px; background:#d4af37; border:none; border-radius:50px; font-weight:800; text-transform:uppercase; cursor:pointer;">Entrar</button>
            <p style="margin-top:20px; color:#666" onclick="toggleAuth(true)">¿Nuevo aquí? <span style="color:#d4af37">Regístrate</span></p>
        </div>
        <div id="reg-form" style="display:none; width:85%; max-width:350px; text-align:center;">
            <input type="text" id="r-user" placeholder="Nombre de usuario" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:10px;">
            <input type="email" id="r-email" placeholder="Correo" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:10px;">
            <input type="password" id="r-pass" placeholder="Contraseña" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:15px;">
            <button onclick="handleAuth('reg')" style="width:100%; padding:16px; background:#d4af37; border:none; border-radius:50px; font-weight:800; text-transform:uppercase; cursor:pointer;">Crear Cuenta</button>
            <p style="margin-top:20px; color:#666" onclick="toggleAuth(false)">¿Ya tienes cuenta? <span style="color:#d4af37">Inicia Sesión</span></p>
        </div>
    </div>

    <div id="app-viewport">
        <!-- FEED -->
        <div id="feed-screen">
            <div id="feed-container"></div>
        </div>

        <!-- SEARCH -->
        <div id="search-screen" class="screen">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Buscar perfiles..." oninput="searchUsers(this.value)">
            </div>
            <div id="search-results"></div>
        </div>

        <!-- INBOX -->
        <div id="inbox-screen" class="screen">
            <div style="padding:20px; border-bottom: 1px solid #222;">
                <h2 style="font-family:'Oswald'; color:#d4af37;">Bandeja de entrada</h2>
            </div>
            <div id="notif-results"></div>
        </div>

        <!-- PROFILE -->
        <div id="profile-screen" class="screen">
            <div class="profile-header">
                <button class="btn-back" onclick="showScreen('feed')"><i class="fas fa-arrow-left"></i></button>
                <div style="font-size: 3.5rem; color: #d4af37;"><i class="fas fa-user-circle"></i></div>
                <h1 id="prof-user" style="font-family:'Oswald'; font-size:1.8rem; color:#d4af37;">@Usuario</h1>
                <button id="btn-logout" onclick="logout()" style="background:none; border:1px solid #333; color:#888; padding:5px 15px; border-radius:5px; margin-top:10px; cursor:pointer;">Cerrar Sesión</button>
            </div>
            <div class="profile-tabs-nav" id="profile-tabs">
                <button class="tab-btn active" id="tab-posts" onclick="switchProfileTab('posts')"><i class="fas fa-th"></i></button>
                <button class="tab-btn" id="tab-likes" onclick="switchProfileTab('likes')"><i class="fas fa-heart"></i></button>
            </div>
            <div class="profile-grid" id="profile-grid"></div>
            <div style="height:80px;"></div>
        </div>

        <!-- UPLOAD -->
        <div id="upload-screen" class="screen" style="padding:20px; justify-content: center;">
            <div style="width:100%; height:50vh; background:#111; border-radius:15px; overflow:hidden;" id="preview-box"></div>
            <textarea id="post-desc" style="width:100%; background:#222; border:none; color:#fff; padding:15px; margin-top:15px; border-radius:10px; font-family:inherit; resize:none;" placeholder="Escribe algo sobre este video..."></textarea>
            <button style="margin-top:15px; width:100%; padding:18px; background:#d4af37; border:none; border-radius:12px; font-weight:bold; color:#000; cursor:pointer;" onclick="startUpload()">PUBLICAR AHORA</button>
            <button onclick="location.reload()" style="background:none; border:none; color:#888; margin-top:15px; width:100%; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <!-- NAVBAR ACTUALIZADA CON LUPA Y BANDEJA -->
    <div class="bottom-nav" id="main-nav" style="display:none;">
        <div class="nav-item active" id="nav-home" onclick="showScreen('feed')">
            <i class="fas fa-home"></i>Inicio
        </div>
        <div class="nav-item" id="nav-search" onclick="showScreen('search')">
            <i class="fas fa-search"></i>Buscar
        </div>
        <div class="nav-item" onclick="document.getElementById('file-input').click()">
            <div class="plus-btn"><i class="fas fa-plus" style="color:#000;"></i></div>
        </div>
        <div class="nav-item" id="nav-inbox" onclick="goToInbox()">
            <i class="fas fa-comment-alt"></i>Bandeja
        </div>
        <div class="nav-item" id="nav-profile-btn" onclick="goToMyProfile()">
            <i class="fas fa-user"></i>Perfil
        </div>
    </div>

    <div id="viewer-modal">
        <i class="fas fa-arrow-left viewer-close" onclick="closeViewer()"></i>
        <div id="viewer-content" style="width:100%; height:100%;"></div>
    </div>

    <input type="file" id="file-input" accept="video/*,image/*" style="display:none">

    <script>
        const SB_URL = 'https://meiwuluwrdjszxeyoqtt.supabase.co';
        const SB_KEY = 'sb_publishable_gZgGIamNJqf8ir8vvt1OTw_bJ-rosi4';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let currentUserId = null;
        let selectedFile = null;
        let viewingUser = null;

        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                currentUserId = session.user.id;
                const { data } = await _supabase.from('perfiles').select('username').eq('id', currentUserId).single();
                currentUser = data?.username || "Anonimo";
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-nav').style.display = 'flex';
                loadFeed();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('main-nav').style.display = 'none';
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById('feed-screen').style.display = id === 'feed' ? 'block' : 'none';
            
            // Actualizar iconos activos
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(id === 'feed') document.getElementById('nav-home').classList.add('active');
            if(id === 'search') document.getElementById('nav-search').classList.add('active');
            if(id === 'inbox') document.getElementById('nav-inbox').classList.add('active');
            if(id === 'profile') document.getElementById('nav-profile-btn').classList.add('active');

            const screen = document.getElementById(id + '-screen');
            if(screen) screen.style.display = id === 'feed' ? 'block' : 'flex';
        }

        // LÓGICA DE BÚSQUEDA
        async function searchUsers(term) {
            if(term.length < 2) {
                document.getElementById('search-results').innerHTML = "";
                return;
            }
            const { data } = await _supabase.from('perfiles').select('username').ilike('username', `%${term}%`).limit(10);
            const res = document.getElementById('search-results');
            res.innerHTML = "";
            data?.forEach(u => {
                const div = document.createElement('div');
                div.className = 'user-row';
                div.onclick = () => goToUserProfile(u.username);
                div.innerHTML = `
                    <img src="https://ui-avatars.com/api/?name=${u.username}&background=random&color=fff">
                    <span style="font-weight:bold;">@${u.username}</span>
                `;
                res.appendChild(div);
            });
        }

        // LÓGICA DE BANDEJA DE ENTRADA (NOTIFICACIONES)
        async function goToInbox() {
            showScreen('inbox');
            const res = document.getElementById('notif-results');
            res.innerHTML = "<p style='padding:20px; color:#555;'>Cargando notificaciones...</p>";
            
            // Aquí asumo que tienes una tabla 'notificaciones' vinculada a tus publicaciones
            const { data } = await _supabase.from('notificaciones')
                .select('*, publicaciones(url, tipo)')
                .eq('target_user_id', currentUserId)
                .order('created_at', { ascending: false });

            res.innerHTML = "";
            if(!data || data.length === 0) {
                res.innerHTML = "<p style='padding:20px; color:#555; text-align:center;'>No tienes notificaciones aún.</p>";
                return;
            }

            data.forEach(n => {
                const row = document.createElement('div');
                row.className = 'notif-row';
                const actionText = n.tipo === 'like' ? 'le dio like a tu video' : `comentó: "${n.comentario}"`;
                row.innerHTML = `
                    <img src="https://ui-avatars.com/api/?name=${n.from_username}&background=random">
                    <div class="notif-content">
                        <span style="font-weight:bold;">${n.from_username}</span> ${actionText}
                        <div class="notif-time">${new Date(n.created_at).toLocaleDateString()}</div>
                    </div>
                    <img class="notif-thumb" src="${n.publicaciones?.url}${n.publicaciones?.tipo === 'video' ? '#t=0.1' : ''}">
                `;
                res.appendChild(row);
            });
        }

        /* [RESTO DE TUS FUNCIONES: loadFeed, renderPost, handleLike, etc., se mantienen idénticas al código anterior] */
        // Nota: Asegúrate de incluir todas tus funciones originales aquí abajo para que el sistema siga operando.
        
        async function loadFeed() {
            const container = document.getElementById('feed-container');
            const { data } = await _supabase.from('publicaciones').select('*').eq('estado', 'aprobado').order('created_at', { ascending: false });
            container.innerHTML = "";
            data?.forEach(post => renderPost(post, container));
            initObserver();
        }

        function renderPost(post, container, isNew = false) {
            const card = document.createElement('div');
            card.className = 'post-card';
            card.id = `post-${post.id}`;
            card.setAttribute('data-id', post.id);
            card.innerHTML = `
                ${post.tipo === 'video' ? `<video class="video-player" src="${post.url}" loop playsinline></video>` : `<img class="video-player" src="${post.url}">`}
                <div class="side-actions">
                    <div class="user-avatar-btn" onclick="goToUserProfile('${post.usuario}')">
                        <img src="https://ui-avatars.com/api/?name=${post.usuario}&background=random">
                    </div>
                    <div class="action-item">
                        <button class="action-btn" id="btn-like-${post.id}" onclick="handleLike('${post.id}', this)"><i class="fas fa-heart"></i></button>
                        <span id="likes-${post.id}">${post.likes || 0}</span>
                    </div>
                </div>
                <div class="ui-info">
                    <h2 onclick="goToUserProfile('${post.usuario}')">@${post.usuario}</h2>
                    <p>${post.descripcion || ''}</p>
                </div>
            `;
            container.appendChild(card);
            if(post.tipo === 'video') {
                const v = card.querySelector('video');
                v.onclick = () => v.paused ? v.play() : v.pause();
            }
        }

        function initObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const v = entry.target.querySelector('video');
                    if (entry.isIntersecting && v) v.play().catch(()=>{});
                    else if(v) { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.post-card').forEach(c => obs.observe(c));
        }

        function goToMyProfile() {
            viewingUser = currentUser;
            document.getElementById('prof-user').innerText = "@" + currentUser;
            showScreen('profile');
            loadUserPosts('posts');
        }

        function goToUserProfile(username) {
            viewingUser = username;
            document.getElementById('prof-user').innerText = "@" + username;
            showScreen('profile');
            loadUserPosts('posts');
        }

        async function loadUserPosts(tab) {
            const grid = document.getElementById('profile-grid');
            grid.innerHTML = "";
            const { data } = await _supabase.from('publicaciones').select('*').eq('usuario', viewingUser).eq('estado', 'aprobado');
            data?.forEach(p => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.innerHTML = p.tipo === 'video' ? `<video src="${p.url}#t=0.1"></video>` : `<img src="${p.url}">`;
                grid.appendChild(item);
            });
        }

        async function handleAuth(type) {
            const e = type === 'reg' ? document.getElementById('r-email').value : document.getElementById('email').value;
            const p = type === 'reg' ? document.getElementById('r-pass').value : document.getElementById('pass').value;
            if(type === 'reg'){
                const u = document.getElementById('r-user').value;
                const { data } = await _supabase.auth.signUp({ email: e, password: p });
                if(data.user) await _supabase.from('perfiles').insert([{ id: data.user.id, username: u }]);
            } else {
                await _supabase.auth.signInWithPassword({ email: e, password: p });
            }
            location.reload();
        }

        function toggleAuth(isReg) {
            document.getElementById('login-form').style.display = isReg ? 'none' : 'block';
            document.getElementById('reg-form').style.display = isReg ? 'block' : 'none';
        }

        async function logout() { await _supabase.auth.signOut(); location.reload(); }

        init();
    </script>
</body>
</html>
