<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA MELY | TV</title>
    <!-- Evitar error favicon 404 -->
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            color: #fff; 
            overflow: hidden; /* Bloquea el scroll del navegador */
            font-family: 'Montserrat', sans-serif; 
        }

        /* --- FEED TIKTOK (Magnetismo Estricto) --- */
        #feed-container { 
            width: 100%; 
            height: calc(100dvh - 65px); 
            overflow-y: scroll; 
            snap-type: y mandatory; /* Convierte el scroll en un carrusel vertical */
            scroll-behavior: smooth;
            scrollbar-width: none; 
            overscroll-behavior-y: contain; /* Evita que la página rebote */
        }
        #feed-container::-webkit-scrollbar { display: none; }

        .post-card { 
            width: 100%; 
            height: calc(100dvh - 65px); 
            snap-align: start; /* Alinea al inicio de cada "slide" */
            snap-stop: always; /* Obliga a parar en cada video, no permite saltar varios */
            position: relative; 
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-player { width: 100%; height: 100%; object-fit: cover; }

        /* --- UI CONTROLES --- */
        .ui-info { position: absolute; bottom: 40px; left: 15px; pointer-events: none; z-index: 10; text-shadow: 2px 2px 8px rgba(0,0,0,1); }
        .ui-info h2 { font-family: 'Oswald'; color: #d4af37; font-size: 1.5rem; margin-bottom: 5px; }
        
        .side-actions { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 20; }
        .action-btn { background: none; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; text-shadow: 2px 2px 5px #000; }
        .action-btn.active { color: #ff0050; }

        /* BARRA DE PROGRESO */
        .progress-container { position: absolute; bottom: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.1); z-index: 20; }
        .progress-bar { height: 100%; background: #d4af37; width: 0%; }

        /* --- NAVEGACION --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { text-align: center; color: #888; font-size: 10px; cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 3px; }
        
        .plus-btn { width: 45px; height: 30px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; position: relative; margin: 0 auto; }
        .plus-btn::before { content:''; position:absolute; left:-3px; width:100%; height:100%; background:#20f3ea; border-radius:10px; z-index:-1; }
        .plus-btn::after { content:''; position:absolute; right:-3px; width:100%; height:100%; background:#ff0050; border-radius:10px; z-index:-1; }

        /* --- PANTALLAS --- */
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; background: #000; z-index: 1500; }
        
        /* AUTH */
        #auth-screen { align-items: center; justify-content: center; z-index: 2000; }
        .auth-box { width: 85%; max-width: 350px; text-align: center; background: #111; padding: 30px; border-radius: 25px; border: 1px solid #222; }
        .btn-main { width: 100%; padding: 16px; background: #d4af37; color: #000; border: none; border-radius: 50px; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        /* PERFIL */
        .profile-header { padding: 40px 20px; text-align: center; background: #111; border-bottom: 1px solid #222; }
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; overflow-y: auto; }
        .grid-item { aspect-ratio: 9/16; background: #222; }
        .grid-item video, .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* CARGA */
        #loading { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div style="border:4px solid #d4af37; border-top:4px solid transparent; width:50px; height:50px; border-radius:50%; animation:spin 1s linear infinite"></div>
        <p style="margin-top:15px; color:#d4af37; font-weight:bold;">PROCESANDO...</p>
    </div>

    <!-- PANTALLA AUTH -->
    <div id="auth-screen" class="screen">
        <div style="font-family:'Oswald'; font-size:3rem; color:#d4af37; margin-bottom:20px;">LA MELY</div>
        <div class="auth-box" id="login-form">
            <input type="email" id="email" placeholder="Correo electrónico">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="btn-main" onclick="handleAuth('login')">Entrar</button>
            <p style="margin-top:20px; color:#666" onclick="toggleAuth(true)">¿Eres nuevo? <span style="color:#d4af37">Regístrate</span></p>
        </div>
        <div class="auth-box" id="reg-form" style="display:none">
            <input type="text" id="r-user" placeholder="Nombre de Usuario">
            <input type="email" id="r-email" placeholder="Correo electrónico">
            <input type="password" id="r-pass" placeholder="Contraseña">
            <button class="btn-main" onclick="handleAuth('reg')">Crear Cuenta</button>
            <p style="margin-top:20px; color:#666" onclick="toggleAuth(false)">¿Ya tienes cuenta? <span style="color:#d4af37">Inicia Sesión</span></p>
        </div>
    </div>

    <!-- PANTALLA FEED -->
    <div id="feed-screen" style="display:block;">
        <div id="feed-container"></div>
        <div class="bottom-nav">
            <div class="nav-item active" onclick="showScreen('feed')"><i class="fas fa-home"></i>Inicio</div>
            <div class="nav-item" onclick="document.getElementById('file-input').click()">
                <div class="plus-btn"><i class="fas fa-plus" style="color:#000; font-size:1rem"></i></div>
            </div>
            <div class="nav-item" onclick="showScreen('profile')"><i class="fas fa-user"></i>Perfil</div>
        </div>
    </div>

    <!-- PANTALLA PERFIL -->
    <div id="profile-screen" class="screen">
        <div class="profile-header">
            <h1 id="prof-user">@Usuario</h1>
            <button onclick="logout()" style="background:none; border:1px solid #444; color:#fff; padding:5px 15px; border-radius:5px; margin-top:10px;">Cerrar Sesión</button>
        </div>
        <div class="profile-grid" id="profile-grid"></div>
        <div class="bottom-nav">
            <div class="nav-item" onclick="showScreen('feed')"><i class="fas fa-home"></i>Inicio</div>
            <div class="nav-item" onclick="document.getElementById('file-input').click()">
                <div class="plus-btn"><i class="fas fa-plus" style="color:#000; font-size:1rem"></i></div>
            </div>
            <div class="nav-item active"><i class="fas fa-user"></i>Perfil</div>
        </div>
    </div>

    <!-- PANTALLA SUBIDA -->
    <div id="upload-screen" class="screen" style="padding:20px;">
        <div style="width:100%; height:60vh; background:#111; border-radius:15px; overflow:hidden;" id="preview-box"></div>
        <textarea id="post-desc" style="width:100%; background:#222; border:none; color:#fff; padding:15px; margin-top:15px; border-radius:10px;" placeholder="Descripción..."></textarea>
        <button class="btn-main" style="margin-top:15px;" onclick="startUpload()">Publicar</button>
        <button onclick="location.reload()" style="background:none; border:none; color:#888; margin-top:15px; width:100%;">Cancelar</button>
    </div>

    <input type="file" id="file-input" accept="video/*,image/*" style="display:none">

    <script>
        const SB_URL = 'https://meiwuluwrdjszxeyoqtt.supabase.co';
        const SB_KEY = 'sb_publishable_gZgGIamNJqf8ir8vvt1OTw_bJ-rosi4';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let selectedFile = null;

        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                const { data } = await _supabase.from('perfiles').select('username').eq('id', session.user.id).single();
                currentUser = data?.username || "Anonimo";
                document.getElementById('prof-user').innerText = "@" + currentUser;
                loadFeed();
                setupRealtime();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById('feed-screen').style.display = id === 'feed' ? 'block' : 'none';
            if(id !== 'feed') document.getElementById(id + '-screen').style.display = 'flex';
            if(id === 'profile') loadUserPosts();
        }

        async function loadFeed() {
            const { data } = await _supabase.from('publicaciones').select('*').eq('estado', 'aprobado').order('created_at', { ascending: false });
            const container = document.getElementById('feed-container');
            container.innerHTML = "";
            data?.forEach(post => renderPost(post));
            initObserver();
        }

        async function loadUserPosts() {
            const { data } = await _supabase.from('publicaciones').select('*').eq('usuario', currentUser).order('created_at', { ascending: false });
            const grid = document.getElementById('profile-grid');
            grid.innerHTML = "";
            data?.forEach(post => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.innerHTML = post.tipo === 'video' ? `<video src="${post.url}"></video>` : `<img src="${post.url}">`;
                grid.appendChild(item);
            });
        }

        function renderPost(post, isNew = false) {
            const container = document.getElementById('feed-container');
            if (document.getElementById(`post-${post.id}`)) return;
            const card = document.createElement('div');
            card.className = 'post-card';
            card.id = `post-${post.id}`;
            card.innerHTML = `
                ${post.tipo === 'video' ? `<video class="video-player" src="${post.url}" loop playsinline></video>` : `<img class="video-player" src="${post.url}">`}
                <div class="side-actions">
                    <button class="action-btn" onclick="this.classList.toggle('active')"><i class="fas fa-heart"></i></button>
                    <button class="action-btn"><i class="fas fa-comment"></i></button>
                    <button class="action-btn"><i class="fas fa-share"></i></button>
                </div>
                <div class="ui-info"><h2>@${post.usuario}</h2><p>${post.descripcion || ''}</p></div>
                <div class="progress-container"><div class="progress-bar" id="bar-${post.id}"></div></div>
            `;
            if (isNew) {
                container.prepend(card);
                container.scrollTo({top: 0, behavior: 'smooth'});
                initObserver();
            } else container.appendChild(card);
            if (post.tipo === 'video') setupVideo(card);
        }

        function setupVideo(card) {
            const v = card.querySelector('video');
            const bar = card.querySelector('.progress-bar');
            v.onclick = () => v.paused ? v.play() : v.pause();
            v.ontimeupdate = () => bar.style.width = (v.currentTime / v.duration) * 100 + "%";
        }

        function initObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const v = entry.target.querySelector('video');
                    if (v) entry.isIntersecting ? v.play() : (v.pause(), v.currentTime = 0);
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.post-card').forEach(c => obs.observe(c));
        }

        function setupRealtime() {
            _supabase.channel('public').on('postgres_changes', { event: 'UPDATE', table: 'publicaciones' }, payload => {
                if (payload.new.estado === 'aprobado') renderPost(payload.new, true);
            }).subscribe();
        }

        async function handleAuth(type) {
            const e = type === 'reg' ? document.getElementById('r-email').value : document.getElementById('email').value;
            const p = type === 'reg' ? document.getElementById('r-pass').value : document.getElementById('pass').value;
            if(type === 'reg'){
                const u = document.getElementById('r-user').value;
                const { data, error } = await _supabase.auth.signUp({ email: e, password: p });
                if(error) return alert(error.message);
                await _supabase.from('perfiles').insert([{ id: data.user.id, username: u }]);
                alert("Registrado correctamente"); location.reload();
            } else {
                const { error } = await _supabase.auth.signInWithPassword({ email: e, password: p });
                if(error) alert("Error al entrar"); else location.reload();
            }
        }

        function toggleAuth(isReg) {
            document.getElementById('login-form').style.display = isReg ? 'none' : 'block';
            document.getElementById('reg-form').style.display = isReg ? 'block' : 'none';
        }

        async function logout() { await _supabase.auth.signOut(); location.reload(); }

        document.getElementById('file-input').onchange = (e) => {
            selectedFile = e.target.files[0];
            if(selectedFile){
                const url = URL.createObjectURL(selectedFile);
                document.getElementById('preview-box').innerHTML = selectedFile.type.includes('video') ? `<video src="${url}" autoplay muted loop style="width:100%; height:100%; object-fit:cover;"></video>` : `<img src="${url}" style="width:100%; height:100%; object-fit:cover;">`;
                showScreen('upload');
            }
        };

        async function startUpload() {
            document.getElementById('loading').style.display = 'flex';
            const fName = Date.now() + "_" + selectedFile.name;
            await _supabase.storage.from('mely_media').upload(fName, selectedFile);
            const { data: urlData } = _supabase.storage.from('mely_media').getPublicUrl(fName);
            await _supabase.from('publicaciones').insert([{ usuario: currentUser, url: urlData.publicUrl, tipo: selectedFile.type.includes('video') ? 'video' : 'imagen', descripcion: document.getElementById('post-desc').value, estado: 'pendiente' }]);
            alert("Subido. Pendiente de aprobación."); location.reload();
        }

        init();
    </script>
</body>
</html>
