<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA MELY | Infinite Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0d0d0d;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark-bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 3rem 1rem;
            text-align: center;
            border-bottom: 2px solid var(--gold);
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(3rem, 12vw, 6rem);
            color: var(--gold);
            letter-spacing: 10px;
        }

        /* Contenedor del Carrusel */
        .carousel-wrapper {
            width: 100%;
            max-width: 1100px;
            margin: 40px auto;
            position: relative;
            overflow: hidden; /* Oculta lo que está fuera del cuadro */
            aspect-ratio: 16 / 9;
        }

        .carousel-track {
            display: flex;
            height: 100%;
            /* La transición se maneja por JS para evitar saltos en el clon */
        }

        .carousel-slide {
            min-width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: var(--gold);
            border: 1px solid var(--gold);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
        }

        .prev { left: 20px; }
        .next { right: 20px; }

        @media (max-width: 480px) {
            .carousel-wrapper { aspect-ratio: 4 / 5; }
        }
    </style>
</head>
<body>

    <header>
        <h1>LA MELY</h1>
        <h2>Las Mejores Fotos 😛</h2>
    </header>

    <div class="carousel-wrapper">
        <div class="carousel-track" id="track">
            <!-- Tus fotos originales -->
            <img src="Captura de pantalla 2026-04-29 191615.png" class="carousel-slide" alt="1">
            <img src="cristian.png" class="carousel-slide" alt="2">
            <img src="iker007.png" class="carousel-slide" alt="3">
            <img src="angel00.png" class="carousel-slide" alt="4">
        </div>

        <button class="nav-btn prev" id="prevBtn">&#10094;</button>
        <button class="nav-btn next" id="nextBtn">&#10095;</button>
    </div>

    <script>
        const track = document.getElementById('track');
        const slides = document.querySelectorAll('.carousel-slide');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');

        // 1. Clonamos la primera y última imagen
        const firstClone = slides[0].cloneNode(true);
        const lastClone = slides[slides.length - 1].cloneNode(true);

        // 2. Las añadimos al track
        track.appendChild(firstClone);
        track.insertBefore(lastClone, slides[0]);

        // 3. Ajuste inicial (empezamos en la foto 1, no en el clon)
        let index = 1;
        const size = 100;
        track.style.transform = `translateX(${-index * size}%)`;

        function moveNext() {
            if (index >= track.children.length - 1) return;
            index++;
            track.style.transition = "transform 0.6s ease-in-out";
            track.style.transform = `translateX(${-index * size}%)`;
        }

        function movePrev() {
            if (index <= 0) return;
            index--;
            track.style.transition = "transform 0.6s ease-in-out";
            track.style.transform = `translateX(${-index * size}%)`;
        }

        // 4. El "Truco Infinito": detectamos cuando termina la animación
        track.addEventListener('transitionend', () => {
            if (track.children[index] === firstClone) {
                track.style.transition = "none"; // Quitamos la animación para el salto
                index = 1;
                track.style.transform = `translateX(${-index * size}%)`;
            }
            if (track.children[index] === lastClone) {
                track.style.transition = "none";
                index = track.children.length - 2;
                track.style.transform = `translateX(${-index * size}%)`;
            }
        });

        nextBtn.addEventListener('click', moveNext);
        prevBtn.addEventListener('click', movePrev);

        // Auto-play hacia la derecha siempre
        setInterval(moveNext, 4000);
    </script>
</body>
</html>
