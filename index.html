<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA MELY | TV</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ESTILOS BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Montserrat', sans-serif; }
        #app-viewport { width: 100%; height: calc(100dvh - 65px); position: relative; overflow: hidden; }
        #feed-screen { width: 100%; height: 100%; display: block; }
        #feed-container { width: 100%; height: 100%; overflow-y: scroll; snap-type: y mandatory; scroll-behavior: smooth; scrollbar-width: none; overscroll-behavior-y: contain; }
        #feed-container::-webkit-scrollbar { display: none; }
        
        .post-card { width: 100%; height: 100%; snap-align: start; snap-stop: always; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        .video-player { width: 100%; height: 100%; object-fit: cover; }
        
        /* UI OVERLAY */
        .ui-info { position: absolute; bottom: 40px; left: 15px; z-index: 10; text-shadow: 2px 2px 8px rgba(0,0,0,1); max-width: 70%; }
        .ui-info h2 { font-family: 'Oswald'; color: #d4af37; font-size: 1.4rem; margin-bottom: 5px; cursor: pointer; }
        
        .side-actions { position: absolute; right: 10px; bottom: 80px; display: flex; flex-direction: column; align-items: center; gap: 18px; z-index: 20; }
        .action-item { display: flex; flex-direction: column; align-items: center; color: #fff; font-size: 0.75rem; font-weight: bold; }
        .action-btn { background: none; border: none; color: #fff; font-size: 2.2rem; cursor: pointer; transition: 0.2s; }
        .action-btn.active { color: #ff0050 !important; transform: scale(1.1); }
        
        .user-avatar-btn { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; overflow: hidden; background: #333; margin-bottom: 5px; cursor: pointer; position: relative; }
        .user-avatar-btn img { width: 100%; height: 100%; object-fit: cover; }

        /* BARRA DE NAVEGACIÓN (5 BOTONES) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { text-align: center; color: #888; font-size: 9px; cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 1.3rem; display: block; margin-bottom: 3px; }
        
        .plus-btn { width: 40px; height: 28px; background: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; position: relative; margin: 0 auto; }
        .plus-btn::before { content:''; position:absolute; left:-3px; width:100%; height:100%; background:#20f3ea; border-radius:8px; z-index:-1; }
        .plus-btn::after { content:''; position:absolute; right:-3px; width:100%; height:100%; background:#ff0050; border-radius:8px; z-index:-1; }

        /* PANTALLAS (SEARCH E INBOX) */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; background: #000; z-index: 1500; overflow-y: auto; padding-bottom: 70px; }
        .header-title { padding: 20px; font-family: 'Oswald'; font-size: 1.5rem; border-bottom: 1px solid #222; text-align: center; color: #d4af37; }
        
        /* ESTILOS BUSCADOR */
        .search-container { padding: 15px; }
        .search-input-wrapper { background: #1a1a1a; border-radius: 8px; display: flex; align-items: center; padding: 10px 15px; }
        .search-input-wrapper input { background: none; border: none; color: #fff; flex: 1; margin-left: 10px; outline: none; font-size: 1rem; }
        
        /* ESTILOS NOTIFICACIONES */
        .notif-item { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #111; gap: 12px; }
        .notif-avatar { width: 45px; height: 45px; border-radius: 50%; overflow: hidden; border: 1px solid #333; }
        .notif-content { flex: 1; font-size: 0.85rem; line-height: 1.3; }
        .notif-content b { color: #fff; }
        .notif-thumb { width: 40px; height: 55px; background: #111; border-radius: 4px; overflow: hidden; }
        .notif-thumb img, .notif-thumb video { width: 100%; height: 100%; object-fit: cover; }

        /* PERFIL GRID */
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .grid-item { aspect-ratio: 9/16; background: #111; overflow: hidden; position: relative; }
        .grid-item video, .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        #loading { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 4000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div style="border:4px solid #d4af37; border-top:4px solid transparent; width:50px; height:50px; border-radius:50%; animation:spin 1s linear infinite"></div>
    </div>

    <!-- PANTALLA AUTH (Mantenida) -->
    <div id="auth-screen" class="screen" style="display:flex; align-items:center; justify-content:center; z-index:9000;">
        <div style="font-family:'Oswald'; font-size:3.5rem; color:#d4af37; margin-bottom:20px; letter-spacing:5px;">LA MELY</div>
        <div id="login-form" style="width:85%; max-width:350px; text-align:center;">
            <input type="email" id="email" placeholder="Correo" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:10px;">
            <input type="password" id="pass" placeholder="Contraseña" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:15px;">
            <button onclick="handleAuth('login')" style="width:100%; padding:16px; background:#d4af37; border:none; border-radius:50px; font-weight:800; text-transform:uppercase; cursor:pointer;">Entrar</button>
            <p style="margin-top:20px; color:#666" onclick="toggleAuth(true)">¿Nuevo aquí? <span style="color:#d4af37">Regístrate</span></p>
        </div>
        <div id="reg-form" style="display:none; width:85%; max-width:350px; text-align:center;">
            <input type="text" id="r-user" placeholder="Nombre de usuario" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:10px;">
            <input type="email" id="r-email" placeholder="Correo" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:10px;">
            <input type="password" id="r-pass" placeholder="Contraseña" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:15px;">
            <button onclick="handleAuth('reg')" style="width:100%; padding:16px; background:#d4af37; border:none; border-radius:50px; font-weight:800; text-transform:uppercase; cursor:pointer;">Crear Cuenta</button>
            <p style="margin-top:20px; color:#666" onclick="toggleAuth(false)">¿Ya tienes cuenta? <span style="color:#d4af37">Inicia Sesión</span></p>
        </div>
    </div>

    <div id="app-viewport">
        <!-- FEED -->
        <div id="feed-screen">
            <div id="feed-container"></div>
        </div>

        <!-- BUSCADOR (LUPA) -->
        <div id="search-screen" class="screen">
            <div class="header-title">DESCUBRIR</div>
            <div class="search-container">
                <div class="search-input-wrapper">
                    <i class="fas fa-search" style="color:#888"></i>
                    <input type="text" id="user-search-input" placeholder="Buscar usuarios..." oninput="searchUsers()">
                </div>
            </div>
            <div id="search-results"></div>
        </div>

        <!-- BANDEJA DE ENTRADA -->
        <div id="inbox-screen" class="screen">
            <div class="header-title">ACTIVIDAD</div>
            <div id="notif-container"></div>
        </div>

        <!-- PERFIL -->
        <div id="profile-screen" class="screen">
            <div class="profile-header">
                <button class="btn-back" onclick="showScreen('feed')"><i class="fas fa-arrow-left"></i></button>
                <div style="font-size: 3.5rem; color: #d4af37;"><i class="fas fa-user-circle"></i></div>
                <h1 id="prof-user" style="font-family:'Oswald'; font-size:1.8rem; color:#d4af37;">@Usuario</h1>
                <button id="btn-logout" onclick="logout()" style="background:none; border:1px solid #333; color:#888; padding:5px 15px; border-radius:5px; margin-top:10px;">Cerrar Sesión</button>
            </div>
            <div class="profile-grid" id="profile-grid"></div>
        </div>

        <!-- UPLOAD (Mantenido) -->
        <div id="upload-screen" class="screen" style="padding:20px; justify-content: center;">
            <div id="preview-box" style="width:100%; height:50vh; background:#111; border-radius:15px; overflow:hidden;"></div>
            <textarea id="post-desc" style="width:100%; background:#222; border:none; color:#fff; padding:15px; margin-top:15px; border-radius:10px; height:80px;" placeholder="Descripción..."></textarea>
            <button style="margin-top:15px; width:100%; padding:18px; background:#d4af37; border:none; border-radius:12px; font-weight:bold;" onclick="startUpload()">PUBLICAR</button>
            <button onclick="location.reload()" style="background:none; border:none; color:#888; margin-top:15px; width:100%;">Cancelar</button>
        </div>
    </div>

    <!-- NAVBAR ACTUALIZADA -->
    <div class="bottom-nav" id="main-nav" style="display:none;">
        <div class="nav-item active" id="nav-home" onclick="showScreen('feed')"><i class="fas fa-home"></i>Inicio</div>
        <div class="nav-item" id="nav-search" onclick="showScreen('search')"><i class="fas fa-search"></i>Buscar</div>
        <div class="nav-item" onclick="document.getElementById('file-input').click()"><div class="plus-btn"><i class="fas fa-plus" style="color:#000;"></i></div></div>
        <div class="nav-item" id="nav-inbox" onclick="showScreen('inbox')"><i class="fas fa-comment-alt"></i>Bandeja</div>
        <div class="nav-item" id="nav-profile" onclick="goToMyProfile()"><i class="fas fa-user"></i>Perfil</div>
    </div>

    <input type="file" id="file-input" accept="video/*,image/*" style="display:none">

    <script>
        const SB_URL = 'https://meiwuluwrdjszxeyoqtt.supabase.co';
        const SB_KEY = 'sb_publishable_gZgGIamNJqf8ir8vvt1OTw_bJ-rosi4';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let currentUserId = null;
        let viewingUser = null;

        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                currentUserId = session.user.id;
                const { data } = await _supabase.from('perfiles').select('username').eq('id', currentUserId).single();
                currentUser = data?.username || "Anonimo";
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-nav').style.display = 'flex';
                loadFeed();
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen, #feed-screen').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            if(id === 'feed') {
                document.getElementById('feed-screen').style.display = 'block';
                document.getElementById('nav-home').classList.add('active');
            } else {
                document.getElementById(id + '-screen').style.display = 'flex';
                const navBtn = document.getElementById('nav-' + id);
                if(navBtn) navBtn.classList.add('active');
                
                if(id === 'inbox') loadInbox();
            }
        }

        // --- LÓGICA DE BÚSQUEDA ---
        async function searchUsers() {
            const query = document.getElementById('user-search-input').value.trim();
            const resultsDiv = document.getElementById('search-results');
            if(query.length < 2) { resultsDiv.innerHTML = ""; return; }

            const { data } = await _supabase.from('perfiles').select('username').ilike('username', `%${query}%`).limit(10);
            
            resultsDiv.innerHTML = "";
            data?.forEach(user => {
                const item = document.createElement('div');
                item.className = 'notif-item';
                item.style.cursor = 'pointer';
                item.onclick = () => goToUserProfile(user.username);
                item.innerHTML = `
                    <div class="notif-avatar"><img src="https://ui-avatars.com/api/?name=${user.username}&background=random"></div>
                    <div class="notif-content"><b>@${user.username}</b></div>
                    <i class="fas fa-chevron-right" style="color:#333"></i>
                `;
                resultsDiv.appendChild(item);
            });
        }

        // --- LÓGICA DE BANDEJA DE ENTRADA (NOTIFICACIONES) ---
        async function loadInbox() {
            const container = document.getElementById('notif-container');
            container.innerHTML = "<p style='text-align:center; padding:20px; color:#444;'>Cargando actividad...</p>";

            // Consultamos los likes de las publicaciones que pertenecen al usuario actual
            const { data, error } = await _supabase
                .from('likes')
                .select(`
                    created_at,
                    user_id,
                    perfiles:user_id(username),
                    publicaciones!inner(url, tipo, usuario)
                `)
                .eq('publicaciones.usuario', currentUser)
                .order('created_at', { ascending: false })
                .limit(20);

            container.innerHTML = "";
            if(!data || data.length === 0) {
                container.innerHTML = "<p style='text-align:center; padding:50px; color:#444;'>Aún no tienes notificaciones.</p>";
                return;
            }

            data.forEach(n => {
                const item = document.createElement('div');
                item.className = 'notif-item';
                item.innerHTML = `
                    <div class="notif-avatar"><img src="https://ui-avatars.com/api/?name=${n.perfiles.username}&background=random"></div>
                    <div class="notif-content">
                        <b>${n.perfiles.username}</b> le dio me gusta a tu publicación.
                        <div style="font-size:0.7rem; color:#444; margin-top:2px;">${new Date(n.created_at).toLocaleDateString()}</div>
                    </div>
                    <div class="notif-thumb">
                        ${n.publicaciones.tipo === 'video' ? `<video src="${n.publicaciones.url}#t=0.5"></video>` : `<img src="${n.publicaciones.url}">`}
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // --- LAS FUNCIONES DE FEED Y PERFIL SE MANTIENEN ---
        async function loadFeed() {
            const container = document.getElementById('feed-container');
            const { data: seenVideos } = await _supabase.from('vistan_historial').select('post_id').eq('user_id', currentUserId);
            const seenIds = seenVideos ? seenVideos.map(v => v.post_id) : [];

            let query = _supabase.from('publicaciones').select('*').eq('estado', 'aprobado').neq('usuario', currentUser).order('created_at', { ascending: false });
            if (seenIds.length > 0) query = query.not('id', 'in', `(${seenIds.join(',')})`);
            
            const { data } = await query;
            container.innerHTML = "";
            if (!data || data.length === 0) {
                container.innerHTML = `<div style="height:100%; display:flex; align-items:center; justify-content:center;"><h2>¡ESTÁS AL DÍA!</h2></div>`;
                return;
            }
            data.forEach(post => renderPost(post, container));
            initObserver();
        }

        function renderPost(post, container) {
            const card = document.createElement('div');
            card.className = 'post-card';
            card.setAttribute('data-id', post.id);
            card.innerHTML = `
                ${post.tipo === 'video' ? `<video class="video-player" src="${post.url}" loop playsinline></video>` : `<img class="video-player" src="${post.url}">`}
                <div class="side-actions">
                    <div class="user-avatar-btn" onclick="goToUserProfile('${post.usuario}')">
                        <img src="https://ui-avatars.com/api/?name=${post.usuario}&background=random&color=fff">
                    </div>
                    <div class="action-item">
                        <button class="action-btn" onclick="handleLike('${post.id}', this)"><i class="fas fa-heart"></i></button>
                        <span>${post.likes || 0}</span>
                    </div>
                </div>
                <div class="ui-info">
                    <h2 onclick="goToUserProfile('${post.usuario}')">@${post.usuario}</h2>
                    <p>${post.descripcion || ''}</p>
                </div>
            `;
            container.appendChild(card);
            if(post.tipo === 'video') card.querySelector('video').onclick = (e) => e.target.paused ? e.target.play() : e.target.pause();
        }

        async function handleLike(postId, btn) {
            if(btn.classList.contains('active')) return;
            btn.classList.add('active');
            await _supabase.from('likes').insert([{ user_id: currentUserId, post_id: Number(postId) }]);
            await _supabase.rpc('increment_likes', { post_id: postId.toString() });
        }

        function initObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const v = entry.target.querySelector('video');
                    if (entry.isIntersecting) { if(v) v.play(); } else if(v) v.pause();
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.post-card').forEach(c => obs.observe(c));
        }

        async function goToUserProfile(username) {
            viewingUser = username;
            document.getElementById('prof-user').innerText = "@" + username;
            showScreen('profile');
            const { data } = await _supabase.from('publicaciones').select('*').eq('usuario', username).eq('estado', 'aprobado');
            const grid = document.getElementById('profile-grid');
            grid.innerHTML = "";
            data?.forEach(post => {
                grid.innerHTML += `<div class="grid-item">${post.tipo === 'video' ? `<video src="${post.url}#t=0.1"></video>` : `<img src="${post.url}">`}</div>`;
            });
        }

        function goToMyProfile() { goToUserProfile(currentUser); document.getElementById('btn-logout').style.display = 'block'; }

        // --- AUTH Y UPLOAD (Mantenido) ---
        async function handleAuth(type) {
            const e = type === 'reg' ? document.getElementById('r-email').value : document.getElementById('email').value;
            const p = type === 'reg' ? document.getElementById('r-pass').value : document.getElementById('pass').value;
            if(type === 'reg'){
                const u = document.getElementById('r-user').value;
                const { data } = await _supabase.auth.signUp({ email: e, password: p });
                if(data.user) await _supabase.from('perfiles').insert([{ id: data.user.id, username: u }]);
            } else {
                await _supabase.auth.signInWithPassword({ email: e, password: p });
            }
            location.reload();
        }

        function toggleAuth(isReg) {
            document.getElementById('login-form').style.display = isReg ? 'none' : 'block';
            document.getElementById('reg-form').style.display = isReg ? 'block' : 'none';
        }

        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            if(file){
                const url = URL.createObjectURL(file);
                document.getElementById('preview-box').innerHTML = file.type.includes('video') ? `<video src="${url}" autoplay muted loop style="width:100%; height:100%; object-fit:cover;"></video>` : `<img src="${url}" style="width:100%; height:100%; object-fit:cover;">`;
                showScreen('upload');
                window.selectedFile = file;
            }
        };

        async function startUpload() {
            const file = window.selectedFile;
            if(!file) return;
            document.getElementById('loading').style.display = 'flex';
            const fName = Date.now() + "_" + file.name;
            await _supabase.storage.from('mely_media').upload(fName, file);
            const { data } = _supabase.storage.from('mely_media').getPublicUrl(fName);
            await _supabase.from('publicaciones').insert([{ 
                usuario: currentUser, url: data.publicUrl, 
                tipo: file.type.includes('video') ? 'video' : 'imagen', 
                descripcion: document.getElementById('post-desc').value, 
                estado: 'pendiente'
            }]);
            location.reload();
        }

        function logout() { _supabase.auth.signOut(); location.reload(); }

        init();
    </script>
</body>
</html>
