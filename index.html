<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA MELY | TV</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Montserrat', sans-serif; }

        /* --- FEED TIKTOK --- */
        #feed-container { 
            width: 100%; height: calc(100dvh - 65px); overflow-y: scroll; 
            snap-type: y mandatory; scrollbar-width: none;
        }
        #feed-container::-webkit-scrollbar { display: none; }

        .post-card { 
            width: 100%; height: calc(100dvh - 65px); snap-align: start; snap-stop: always; 
            position: relative; background: #000; display: flex; align-items: center; justify-content: center;
        }
        .video-player { width: 100%; height: 100%; object-fit: cover; }

        /* --- UI CONTROLES --- */
        .ui-info { position: absolute; bottom: 40px; left: 15px; pointer-events: none; z-index: 10; text-shadow: 2px 2px 8px rgba(0,0,0,1); max-width: 70%; }
        .ui-info h2 { font-family: 'Oswald'; color: #d4af37; font-size: 1.4rem; }
        
        .side-actions { position: absolute; right: 10px; bottom: 80px; display: flex; flex-direction: column; align-items: center; gap: 18px; z-index: 20; }
        .action-item { display: flex; flex-direction: column; align-items: center; color: #fff; font-size: 0.75rem; font-weight: bold; }
        .action-btn { background: none; border: none; color: #fff; font-size: 2.2rem; cursor: pointer; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5)); }
        .action-btn.active { color: #ff0050; }
        .btn-delete { color: #ff4444 !important; font-size: 1.8rem !important; margin-top: 10px; opacity: 0.8; }

        .progress-container { position: absolute; bottom: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.1); z-index: 20; }
        .progress-bar { height: 100%; background: #d4af37; width: 0%; }

        /* --- NAVEGACION --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { text-align: center; color: #888; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 3px; }
        .plus-btn { width: 45px; height: 30px; background: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; color:#000; }

        /* --- PANTALLAS --- */
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; background: #000; z-index: 1500; }
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; overflow-y: auto; }
        .grid-item { aspect-ratio: 9/16; background: #111; position: relative; overflow: hidden; cursor: pointer; }
        .grid-item video, .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* VISOR FULL */
        #viewer-full { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; }
        .close-viewer { position: absolute; top: 20px; left: 20px; font-size: 2.2rem; z-index: 3100; color: #fff; text-shadow: 0 0 10px #000; cursor: pointer; }

        #loading { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 4000; display: none; align-items: center; justify-content: center; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div style="border:4px solid #d4af37; border-top:4px solid transparent; width:50px; height:50px; border-radius:50%; animation:spin 1s linear infinite"></div>
    </div>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="screen" style="align-items:center; justify-content:center; z-index:5000;">
        <h1 style="font-family:'Oswald'; color:#d4af37; font-size:3.5rem; margin-bottom:2rem; letter-spacing:3px;">LA MELY</h1>
        <div id="login-form" style="width:80%; max-width:300px;">
            <input type="email" id="email" placeholder="Email" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:none; background:#111; color:#fff;">
            <input type="password" id="pass" placeholder="Contraseña" style="width:100%; padding:15px; margin-bottom:20px; border-radius:12px; border:none; background:#111; color:#fff;">
            <button onclick="handleAuth('login')" style="width:100%; padding:15px; border-radius:30px; border:none; background:#d4af37; font-weight:bold; color:#000;">ENTRAR</button>
            <p onclick="toggleAuth(true)" style="text-align:center; margin-top:20px; font-size:0.9rem; color:#888;">¿Eres nuevo? <span style="color:#d4af37">Crea una cuenta</span></p>
        </div>
        <div id="reg-form" style="width:80%; max-width:300px; display:none;">
            <input type="text" id="r-user" placeholder="Usuario" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:none; background:#111; color:#fff;">
            <input type="email" id="r-email" placeholder="Email" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:none; background:#111; color:#fff;">
            <input type="password" id="r-pass" placeholder="Contraseña" style="width:100%; padding:15px; margin-bottom:20px; border-radius:12px; border:none; background:#111; color:#fff;">
            <button onclick="handleAuth('reg')" style="width:100%; padding:15px; border-radius:30px; border:none; background:#d4af37; font-weight:bold; color:#000;">REGISTRARME</button>
            <p onclick="toggleAuth(false)" style="text-align:center; margin-top:20px; font-size:0.9rem; color:#888;">¿Ya tienes cuenta? <span style="color:#d4af37">Inicia Sesión</span></p>
        </div>
    </div>

    <!-- FEED SCREEN -->
    <div id="feed-screen">
        <div id="feed-container"></div>
    </div>

    <!-- PROFILE SCREEN -->
    <div id="profile-screen" class="screen">
        <div style="padding:40px 20px; text-align:center;">
            <div style="width:90px; height:90px; border-radius:50%; background:#111; margin:0 auto 15px; border:2px solid #d4af37; display:flex; align-items:center; justify-content:center; font-size:2.5rem; color:#d4af37;"><i class="fas fa-user"></i></div>
            <h2 id="prof-user" style="font-family:'Oswald'; color:#d4af37;">@Usuario</h2>
            <button onclick="logout()" style="background:none; border:1px solid #333; color:#666; padding:6px 18px; border-radius:8px; margin-top:15px; font-size:0.7rem;">CERRAR SESIÓN</button>
        </div>
        <div class="profile-grid" id="profile-grid"></div>
    </div>

    <!-- UPLOAD SCREEN -->
    <div id="upload-screen" class="screen" style="padding:20px; justify-content:center;">
        <div id="preview-box" style="width:100%; height:55%; background:#111; border-radius:20px; overflow:hidden;"></div>
        <textarea id="post-desc" style="width:100%; padding:15px; background:#111; color:#fff; border:1px solid #222; border-radius:12px; margin-top:15px; font-family:inherit;" placeholder="¿De qué trata este video?"></textarea>
        <button onclick="startUpload()" style="width:100%; padding:18px; background:#d4af37; color:#000; font-weight:bold; border-radius:15px; margin-top:15px; border:none;">SUBIR AHORA</button>
        <button onclick="location.reload()" style="width:100%; color:#555; margin-top:15px; background:none; border:none;">Cancelar</button>
    </div>

    <!-- VISOR FULL -->
    <div id="viewer-full">
        <i class="fas fa-arrow-left close-viewer" onclick="closeViewer()"></i>
        <div id="viewer-content" style="width:100%; height:100%;"></div>
    </div>

    <!-- NAV BAR -->
    <div class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="showScreen('feed')"><i class="fas fa-home"></i>Inicio</div>
        <div class="nav-item" onclick="document.getElementById('file-input').click()"><div class="plus-btn"><i class="fas fa-plus"></i></div></div>
        <div class="nav-item" id="nav-profile" onclick="showScreen('profile')"><i class="fas fa-user"></i>Perfil</div>
    </div>

    <input type="file" id="file-input" accept="video/*,image/*" style="display:none">

    <script>
        const SB_URL = 'https://meiwuluwrdjszxeyoqtt.supabase.co';
        const SB_KEY = 'sb_publishable_gZgGIamNJqf8ir8vvt1OTw_bJ-rosi4';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let selectedFile = null;

        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                const { data } = await _supabase.from('perfiles').select('username').eq('id', session.user.id).single();
                currentUser = data?.username || "Anonimo";
                document.getElementById('prof-user').innerText = "@" + currentUser;
                loadFeed();
                setupRealtime();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById('feed-screen').style.display = (id === 'feed') ? 'block' : 'none';
            document.getElementById('nav-home').classList.toggle('active', id === 'feed');
            document.getElementById('nav-profile').classList.toggle('active', id === 'profile');
            
            if(id !== 'feed') document.getElementById(id + '-screen').style.display = 'flex';
            if(id === 'profile') loadUserPosts();
        }

        async function loadFeed() {
            const { data } = await _supabase.from('publicaciones').select('*').eq('estado', 'aprobado').order('created_at', { ascending: false });
            const container = document.getElementById('feed-container');
            container.innerHTML = "";
            data?.forEach(post => renderPost(post, container));
            initObserver();
        }

        async function loadUserPosts() {
            const { data } = await _supabase.from('publicaciones').select('*').eq('usuario', currentUser).order('created_at', { ascending: false });
            const grid = document.getElementById('profile-grid');
            grid.innerHTML = "";
            data?.forEach(post => {
                const div = document.createElement('div');
                div.className = 'grid-item';
                div.onclick = () => openFullViewer(post);
                div.innerHTML = post.tipo === 'video' ? `<video src="${post.url}#t=0.1"></video>` : `<img src="${post.url}">`;
                grid.appendChild(div);
            });
        }

        function renderPost(post, container, isNew = false) {
            if (document.getElementById(`post-${post.id}`)) return;
            const card = document.createElement('div');
            card.className = 'post-card';
            card.id = `post-${post.id}`;
            card.setAttribute('data-id', post.id);

            const isOwner = post.usuario === currentUser;

            card.innerHTML = `
                ${post.tipo === 'video' ? `<video class="video-player" src="${post.url}" loop playsinline></video>` : `<img class="video-player" src="${post.url}">`}
                <div class="side-actions">
                    <div class="action-item">
                        <button class="action-btn" id="btn-like-${post.id}" onclick="handleLike('${post.id}')"><i class="fas fa-heart"></i></button>
                        <span id="likes-${post.id}">${post.likes || 0}</span>
                    </div>
                    <div class="action-item">
                        <button class="action-btn" onclick="alert('Comentarios próximamente')"><i class="fas fa-comment-dots"></i></button>
                        <span id="comm-count-${post.id}">${post.comentarios_count || 0}</span>
                    </div>
                    <div class="action-item">
                        <i class="fas fa-play" style="font-size:1.5rem; opacity:0.5"></i>
                        <span id="vistas-${post.id}">${post.vistas || 0}</span>
                    </div>
                    ${isOwner ? `<button class="action-btn btn-delete" onclick="deletePost('${post.id}', '${post.url}')"><i class="fas fa-trash-alt"></i></button>` : ''}
                </div>
                <div class="ui-info">
                    <h2>@${post.usuario}</h2>
                    <p>${post.descripcion || ''}</p>
                </div>
                <div class="progress-container"><div class="progress-bar" id="bar-${post.id}"></div></div>
            `;
            isNew ? container.prepend(card) : container.appendChild(card);
            if (post.tipo === 'video') setupVideoEvents(card, post.id);
        }

        function setupVideoEvents(card, postId) {
            const v = card.querySelector('video');
            const bar = card.querySelector('.progress-bar');
            v.onclick = () => v.paused ? v.play() : v.pause();
            v.ontimeupdate = () => bar.style.width = (v.currentTime / v.duration) * 100 + "%";
        }

        async function handleLike(postId) {
            const btn = document.getElementById(`btn-like-${postId}`);
            if(btn.classList.contains('active')) return;
            btn.classList.add('active');
            await _supabase.rpc('increment_likes', { post_id: postId.toString() });
        }

        async function markView(postId) {
            const key = `viewed_${postId}`;
            if(sessionStorage.getItem(key)) return;
            sessionStorage.setItem(key, 'true');
            await _supabase.rpc('increment_vistas', { post_id: postId.toString() });
        }

        async function deletePost(postId, fileUrl) {
            if(!confirm("¿Eliminar este contenido de La Mely permanentemente?")) return;
            document.getElementById('loading').style.display = 'flex';
            
            await _supabase.from('publicaciones').delete().eq('id', postId);
            const fileName = fileUrl.split('/').pop();
            await _supabase.storage.from('mely_media').remove([fileName]);
            
            location.reload();
        }

        function initObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const id = entry.target.getAttribute('data-id');
                    const v = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        if(v) v.play().catch(()=>{});
                        markView(id);
                    } else {
                        if(v) { v.pause(); v.currentTime = 0; }
                    }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.post-card').forEach(c => obs.observe(c));
        }

        function openFullViewer(post) {
            const viewer = document.getElementById('viewer-full');
            const content = document.getElementById('viewer-content');
            viewer.style.display = 'block';
            content.innerHTML = ""; 
            renderPost(post, content);
            
            const card = content.querySelector('.post-card');
            card.style.height = '100dvh';
            const v = card.querySelector('video');
            if(v) v.play();
        }

        function closeViewer() { 
            document.getElementById('viewer-full').style.display = 'none';
            document.getElementById('viewer-content').innerHTML = "";
        }

        function setupRealtime() {
            _supabase.channel('public').on('postgres_changes', { event: '*', table: 'publicaciones' }, payload => {
                if (payload.eventType === 'UPDATE') {
                    const post = payload.new;
                    const l = document.getElementById(`likes-${post.id}`); if(l) l.innerText = post.likes;
                    const v = document.getElementById(`vistas-${post.id}`); if(v) v.innerText = post.vistas;
                    if(payload.old.estado === 'pendiente' && post.estado === 'aprobado') loadFeed();
                }
                if (payload.eventType === 'DELETE') {
                    document.getElementById(`post-${payload.old.id}`)?.remove();
                }
            }).subscribe();
        }

        async function handleAuth(type) {
            const e = (type === 'reg' ? document.getElementById('r-email') : document.getElementById('email')).value;
            const p = (type === 'reg' ? document.getElementById('r-pass') : document.getElementById('pass')).value;
            if(type === 'reg') {
                const u = document.getElementById('r-user').value;
                const { data, error } = await _supabase.auth.signUp({ email:e, password:p });
                if(error) return alert(error.message);
                await _supabase.from('perfiles').insert([{ id: data.user.id, username: u }]);
            } else {
                const { error } = await _supabase.auth.signInWithPassword({ email:e, password:p });
                if(error) return alert("Error en los datos");
            }
            location.reload();
        }

        function toggleAuth(isReg) {
            document.getElementById('login-form').style.display = isReg ? 'none' : 'block';
            document.getElementById('reg-form').style.display = isReg ? 'block' : 'none';
        }

        async function logout() { await _supabase.auth.signOut(); location.reload(); }

        document.getElementById('file-input').onchange = (e) => {
            selectedFile = e.target.files[0];
            if(selectedFile) {
                const url = URL.createObjectURL(selectedFile);
                document.getElementById('preview-box').innerHTML = selectedFile.type.includes('video') ? `<video src="${url}" autoplay muted loop style="width:100%; height:100%; object-fit:cover;"></video>` : `<img src="${url}" style="width:100%; height:100%; object-fit:cover;">`;
                showScreen('upload');
            }
        };

        async function startUpload() {
            if(!selectedFile) return;
            document.getElementById('loading').style.display = 'flex';
            const fName = Date.now() + "_" + selectedFile.name;
            await _supabase.storage.from('mely_media').upload(fName, selectedFile);
            const { data: urlData } = _supabase.storage.from('mely_media').getPublicUrl(fName);
            await _supabase.from('publicaciones').insert([{ 
                usuario: currentUser, url: urlData.publicUrl, 
                tipo: selectedFile.type.includes('video') ? 'video' : 'imagen',
                descripcion: document.getElementById('post-desc').value,
                estado: 'pendiente', likes:0, vistas:0, comentarios_count:0
            }]);
            alert("Video enviado a moderación"); 
            location.reload();
        }

        init();
    </script>
</body>
</html>
