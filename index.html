<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA MELY | Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --negro-fondo: #0a0a0a;
            --gris-oscuro: #1a1a1a;
            --dorado-cholo: #c5a059;
            --blanco-humo: #f5f5f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--negro-fondo);
            color: var(--blanco-humo);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* Estilo Gótico/Cholo para el Título */
        header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 2px solid var(--dorado-cholo);
            background: linear-gradient(180deg, #151515 0%, #0a0a0a 100%);
        }

        h1 {
            font-family: 'UnifrakturMaguntia', serif;
            font-size: 4rem;
            color: var(--dorado-cholo);
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 3px 3px 0px rgba(0,0,0,1);
        }

        .subtitle {
            font-size: 0.9rem;
            letter-spacing: 8px;
            color: #888;
            margin-top: 10px;
        }

        /* Contenedor del Carrusel */
        .carousel-container {
            max-width: 1000px;
            margin: 50px auto;
            position: relative;
            padding: 20px;
            background: var(--gris-oscuro);
            border: 1px solid #333;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .carousel-slide {
            display: none;
            width: 100%;
            height: 500px;
            object-fit: cover;
            border: 2px solid var(--dorado-cholo);
        }

        .active {
            display: block;
            animation: fade 0.8s ease-in-out;
        }

        @keyframes fade {
            from { opacity: 0.4; } 
            to { opacity: 1; }
        }

        /* Botones de navegación */
        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            margin-top: -22px;
            padding: 16px;
            color: var(--dorado-cholo);
            font-weight: bold;
            font-size: 24px;
            transition: 0.6s ease;
            user-select: none;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--dorado-cholo);
        }

        .next { right: 30px; }
        .prev { left: 30px; }

        .prev:hover, .next:hover {
            background-color: var(--dorado-cholo);
            color: black;
        }

        footer {
            text-align: center;
            padding: 50px;
            color: #444;
            font-size: 0.8rem;
        }

    </style>
</head>
<body>

    <header>
        <h1>LA MELY</h1>
        <p class="subtitle">ESTILO & RESPETO</p>
    </header>

    <div class="carousel-container">
        <!-- Puedes agregar muchísimas fotos siguiendo este formato -->
        <img class="carousel-slide active" src="https://via.placeholder.com/1000x500/111/c5a059?text=FOTO+1" alt="Foto 1">
        <img class="carousel-slide" src="https://via.placeholder.com/1000x500/111/c5a059?text=FOTO+2" alt="Foto 2">
        <img class="carousel-slide" src="https://via.placeholder.com/1000x500/111/c5a059?text=FOTO+3" alt="Foto 3">
        <img class="carousel-slide" src="https://via.placeholder.com/1000x500/111/c5a059?text=FOTO+4" alt="Foto 4">
        <img class="carousel-slide" src="https://via.placeholder.com/1000x500/111/c5a059?text=FOTO+5" alt="Foto 5">

        <a class="prev" onclick="changeSlide(-1)">&#10094;</a>
        <a class="next" onclick="changeSlide(1)">&#10095;</a>
    </div>

    <footer>
        &copy; 2026 LA MELY - TODOS LOS DERECHOS RESERVADOS
    </footer>

    <script>
        let currentIdx = 0;
        const slides = document.querySelectorAll('.carousel-slide');

        function showSlide(n) {
            slides.forEach(s => s.classList.remove('active'));
            
            currentIdx = (n + slides.length) % slides.length;
            slides[currentIdx].classList.add('active');
        }

        function changeSlide(n) {
            showSlide(currentIdx + n);
        }

        // Cambio automático cada 5 segundos
        setInterval(() => {
            changeSlide(1);
        }, 5000);
    </script>
</body>
</html>
