<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA MELY | TV Supabase</title>
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100%; 
            background: #000; color: #fff; 
            overflow: hidden; font-family: 'Montserrat', sans-serif;
        }

        .feed-container {
            width: 100%; height: 100vh;
            overflow-y: scroll;
            snap-type: y mandatory;
        }

        .post-card {
            width: 100%; height: 100vh;
            snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video, img {
            max-width: 100%; max-height: 100%;
            object-fit: contain;
        }

        .info {
            position: absolute; bottom: 80px; left: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .info h2 { font-family: 'Oswald'; color: #d4af37; }

        header {
            position: fixed; top: 0; width: 100%;
            padding: 15px; text-align: center; z-index: 10;
            background: linear-gradient(rgba(0,0,0,0.7), transparent);
        }
    </style>
</head>
<body>

    <header><h1>LA MELY TV</h1></header>
    <div class="feed-container" id="feed"></div>

    <script>
        // Configuración de Supabase (Usa tus credenciales del casino)
        const SB_URL = 'TU_SUPABASE_URL';
        const SB_KEY = 'TU_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        async function cargarPublicaciones() {
            const feed = document.getElementById('feed');

            // Solo traemos las que tú ya aprobaste
            const { data, error } = await supabase
                .from('publicaciones')
                .select('*')
                .eq('estado', 'aprobado')
                .order('created_at', { ascending: false });

            if (error) return console.error(error);

            data.forEach(post => {
                const card = document.createElement('div');
                card.className = 'post-card';
                
                // Verificamos si es video o imagen
                const mediaHtml = post.tipo === 'video' 
                    ? `<video src="${post.url}" loop muted playsinline></video>`
                    : `<img src="${post.url}">`;

                card.innerHTML = `
                    ${mediaHtml}
                    <div class="info">
                        <h2>@${post.usuario}</h2>
                        <p>${post.descripcion}</p>
                    </div>
                `;
                feed.appendChild(card);
            });

            iniciarObserver();
        }

        function iniciarObserver() {
            const vids = document.querySelectorAll('video');
            const observer = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    if (e.isIntersecting) e.target.play();
                    else e.target.pause();
                });
            }, { threshold: 0.6 });
            vids.forEach(v => observer.observe(v));
        }

        cargarPublicaciones();
    </script>
</body>
</html>
