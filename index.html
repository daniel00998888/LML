<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA MELY | TV</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Montserrat', sans-serif; }
        
        #app-viewport { width: 100%; height: calc(100dvh - 65px); position: relative; overflow: hidden; }
        
        /* FEED STYLES */
        #feed-screen { width: 100%; height: 100%; display: block; }
        #feed-container { width: 100%; height: 100%; overflow-y: scroll; snap-type: y mandatory; scroll-behavior: smooth; scrollbar-width: none; overscroll-behavior-y: contain; }
        #feed-container::-webkit-scrollbar { display: none; }
        
        .post-card { width: 100%; height: 100%; snap-align: start; snap-stop: always; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        .video-player { width: 100%; height: 100%; object-fit: cover; }
        
        /* UI OVERLAYS */
        .ui-info { position: absolute; bottom: 40px; left: 15px; z-index: 10; text-shadow: 2px 2px 8px rgba(0,0,0,1); max-width: 70%; }
        .ui-info h2 { font-family: 'Oswald'; color: #d4af37; font-size: 1.4rem; margin-bottom: 5px; cursor: pointer; display: inline-block; }
        
        .side-actions { position: absolute; right: 10px; bottom: 80px; display: flex; flex-direction: column; align-items: center; gap: 18px; z-index: 20; }
        .action-item { display: flex; flex-direction: column; align-items: center; color: #fff; font-size: 0.75rem; font-weight: bold; }
        .action-btn { background: none; border: none; color: #fff; font-size: 2.2rem; cursor: pointer; transition: 0.2s; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5)); }
        .action-btn.active { color: #ff0050 !important; transform: scale(1.1); }
        
        .user-avatar-btn { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; overflow: hidden; background: #333; margin-bottom: 5px; cursor: pointer; position: relative; }
        .user-avatar-btn img { width: 100%; height: 100%; object-fit: cover; }
        
        /* SEARCH & INBOX STYLES */
        .search-container { padding: 20px; width: 100%; }
        .search-input-wrapper { position: relative; width: 100%; }
        #user-search-input { width: 100%; padding: 15px 45px; background: #111; border: 1px solid #333; color: #fff; border-radius: 50px; outline: none; font-family: inherit; }
        .search-icon-inside { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #888; }
        
        .inbox-header { padding: 20px; border-bottom: 1px solid #222; font-family: 'Oswald'; font-size: 1.5rem; text-align: center; color: #d4af37; }
        .notification-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #111; gap: 12px; animation: fadeIn 0.3s; }
        .notif-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #222; border: 1px solid #333; }
        .notif-content { flex: 1; font-size: 0.85rem; }
        .notif-user { font-weight: bold; color: #d4af37; }
        .notif-comment { font-style: italic; color: #aaa; display: block; margin-top: 4px; border-left: 2px solid #d4af37; padding-left: 8px; font-size: 0.8rem; }
        .notif-post-preview { width: 40px; height: 55px; border-radius: 4px; object-fit: cover; background: #111; }

        /* PROFILE STYLES */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; background: #000; z-index: 1500; overflow-y: auto; }
        .profile-header { padding: 30px 20px; text-align: center; background: #000; }
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .grid-item { aspect-ratio: 9/16; background: #111; position: relative; overflow: hidden; }
        .grid-item video, .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* NAVIGATION */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-item { text-align: center; color: #888; font-size: 10px; cursor: pointer; flex: 1; transition: 0.2s; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 3px; }
        
        .plus-btn { width: 45px; height: 30px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; position: relative; margin: 0 auto; }
        .plus-btn::before { content:''; position:absolute; left:-3px; width:100%; height:100%; background:#20f3ea; border-radius:10px; z-index:-1; }
        .plus-btn::after { content:''; position:absolute; right:-3px; width:100%; height:100%; background:#ff0050; border-radius:10px; z-index:-1; }

        #loading { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 4000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div style="border:4px solid #d4af37; border-top:4px solid transparent; width:50px; height:50px; border-radius:50%; animation:spin 1s linear infinite"></div>
    </div>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="screen" style="display:flex; align-items:center; justify-content:center; z-index:9000;">
        <div style="font-family:'Oswald'; font-size:3.5rem; color:#d4af37; margin-bottom:20px; letter-spacing:5px;">LA MELY</div>
        <div id="login-form" style="width:85%; max-width:350px; text-align:center;">
            <input type="email" id="email" placeholder="Correo" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:10px;">
            <input type="password" id="pass" placeholder="Contraseña" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:15px;">
            <button onclick="handleAuth('login')" style="width:100%; padding:16px; background:#d4af37; border:none; border-radius:50px; font-weight:800; text-transform:uppercase; cursor:pointer; color:#000;">Entrar</button>
            <p style="margin-top:20px; color:#666" onclick="toggleAuth(true)">¿Nuevo aquí? <span style="color:#d4af37">Regístrate</span></p>
        </div>
        <div id="reg-form" style="display:none; width:85%; max-width:350px; text-align:center;">
            <input type="text" id="r-user" placeholder="Nombre de usuario" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:10px;">
            <input type="email" id="r-email" placeholder="Correo" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:10px;">
            <input type="password" id="r-pass" placeholder="Contraseña" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:15px;">
            <button onclick="handleAuth('reg')" style="width:100%; padding:16px; background:#d4af37; border:none; border-radius:50px; font-weight:800; text-transform:uppercase; cursor:pointer; color:#000;">Crear Cuenta</button>
            <p style="margin-top:20px; color:#666" onclick="toggleAuth(false)">¿Ya tienes cuenta? <span style="color:#d4af37">Inicia Sesión</span></p>
        </div>
    </div>

    <div id="app-viewport">
        <!-- FEED -->
        <div id="feed-screen">
            <div id="feed-container"></div>
        </div>

        <!-- SEARCH -->
        <div id="search-screen" class="screen">
            <div class="search-container">
                <div class="search-input-wrapper">
                    <i class="fas fa-search search-icon-inside"></i>
                    <input type="text" id="user-search-input" placeholder="Buscar perfiles..." oninput="searchUsers(this.value)">
                </div>
            </div>
            <div id="search-results" style="padding: 10px;"></div>
        </div>

        <!-- INBOX -->
        <div id="inbox-screen" class="screen">
            <div class="inbox-header">BANDEJA DE ENTRADA</div>
            <div id="notifications-list"></div>
        </div>

        <!-- PROFILE -->
        <div id="profile-screen" class="screen">
            <div class="profile-header">
                <div style="font-size: 3.5rem; color: #d4af37;"><i class="fas fa-user-circle"></i></div>
                <h1 id="prof-user" style="font-family:'Oswald'; font-size:1.8rem; color:#d4af37;">@Usuario</h1>
                <button id="btn-logout" onclick="logout()" style="background:none; border:1px solid #333; color:#888; padding:5px 15px; border-radius:5px; margin-top:10px; cursor:pointer;">Cerrar Sesión</button>
                <button id="btn-back-profile" onclick="showScreen('feed')" style="display:none; background:#222; border:none; color:#fff; padding:8px 20px; border-radius:50px; margin-top:10px;">Volver</button>
            </div>
            <div class="profile-grid" id="profile-grid"></div>
        </div>

        <!-- UPLOAD -->
        <div id="upload-screen" class="screen" style="padding:20px;">
            <div id="preview-box" style="width:100%; height:50vh; background:#111; border-radius:15px; overflow:hidden;"></div>
            <textarea id="post-desc" style="width:100%; background:#222; border:none; color:#fff; padding:15px; margin-top:15px; border-radius:10px; font-family:inherit;" placeholder="¿Qué estás pensando?"></textarea>
            <button style="margin-top:15px; width:100%; padding:18px; background:#d4af37; border:none; border-radius:12px; font-weight:bold; color:#000;" onclick="startUpload()">PUBLICAR</button>
            <button onclick="location.reload()" style="background:none; border:none; color:#888; margin-top:10px; width:100%;">Cancelar</button>
        </div>
    </div>

    <!-- MAIN NAV -->
    <div class="bottom-nav" id="main-nav" style="display:none;">
        <div class="nav-item active" id="nav-home" onclick="showScreen('feed')"><i class="fas fa-home"></i>Inicio</div>
        <div class="nav-item" id="nav-search" onclick="showScreen('search')"><i class="fas fa-search"></i>Buscar</div>
        <div class="nav-item" onclick="document.getElementById('file-input').click()"><div class="plus-btn"><i class="fas fa-plus" style="color:#000;"></i></div></div>
        <div class="nav-item" id="nav-inbox" onclick="showScreen('inbox')"><i class="fas fa-envelope"></i>Bandeja</div>
        <div class="nav-item" id="nav-profile-btn" onclick="goToMyProfile()"><i class="fas fa-user"></i>Perfil</div>
    </div>

    <input type="file" id="file-input" accept="video/*,image/*" style="display:none">

    <script>
        const SB_URL = 'https://meiwuluwrdjszxeyoqtt.supabase.co';
        const SB_KEY = 'sb_publishable_gZgGIamNJqf8ir8vvt1OTw_bJ-rosi4';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let currentUserId = null;
        let selectedFile = null;

        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                currentUserId = session.user.id;
                const { data } = await _supabase.from('perfiles').select('username').eq('id', currentUserId).single();
                currentUser = data?.username || "Anonimo";
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-nav').style.display = 'flex';
                loadFeed();
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById('feed-screen').style.display = id === 'feed' ? 'block' : 'none';
            
            document.getElementById('nav-home').classList.toggle('active', id === 'feed');
            document.getElementById('nav-search').classList.toggle('active', id === 'search');
            document.getElementById('nav-inbox').classList.toggle('active', id === 'inbox');
            document.getElementById('nav-profile-btn').classList.toggle('active', id === 'profile');

            if(id === 'search') document.getElementById('search-screen').style.display = 'flex';
            if(id === 'inbox') { document.getElementById('inbox-screen').style.display = 'flex'; loadNotifications(); }
            if(id === 'profile') document.getElementById('profile-screen').style.display = 'flex';
            if(id === 'upload') document.getElementById('upload-screen').style.display = 'flex';
        }

        // FEED LOGIC (Filters: Not Mine & Not Seen)
        async function loadFeed() {
            const container = document.getElementById('feed-container');
            container.innerHTML = "";

            const { data: seen } = await _supabase.from('vistan_historial').select('post_id').eq('user_id', currentUserId);
            const seenIds = seen ? seen.map(v => v.post_id) : [];

            let query = _supabase.from('publicaciones').select('*').eq('estado', 'aprobado').neq('usuario', currentUser);
            if (seenIds.length > 0) query = query.not('id', 'in', `(${seenIds.join(',')})`);
            
            const { data } = await query.order('created_at', { ascending: false });

            if (!data || data.length === 0) {
                container.innerHTML = `<div style="padding:100px 20px; text-align:center;"><i class="fas fa-check-double" style="font-size:3rem; color:#d4af37;"></i><br><br>¡Estás al día!</div>`;
                return;
            }

            data.forEach(post => renderPost(post, container));
            initObserver();
        }

        function renderPost(post, container) {
            const card = document.createElement('div');
            card.className = 'post-card';
            card.setAttribute('data-id', post.id);
            card.innerHTML = `
                ${post.tipo === 'video' ? `<video class="video-player" src="${post.url}" loop playsinline></video>` : `<img class="video-player" src="${post.url}">`}
                <div class="side-actions">
                    <div class="user-avatar-btn" onclick="goToUserProfile('${post.usuario}')">
                        <img src="https://ui-avatars.com/api/?name=${post.usuario}&background=random&color=fff">
                    </div>
                    <div class="action-item">
                        <button class="action-btn" id="btn-like-${post.id}" onclick="handleLike('${post.id}', '${post.usuario}', this)"><i class="fas fa-heart"></i></button>
                        <span id="likes-${post.id}">${post.likes || 0}</span>
                    </div>
                </div>
                <div class="ui-info">
                    <h2 onclick="goToUserProfile('${post.usuario}')">@${post.usuario}</h2>
                    <p>${post.descripcion || ''}</p>
                </div>
            `;
            container.appendChild(card);
            checkLikeStatus(post.id, card.querySelector('.action-btn'));
        }

        async function handleLike(postId, postOwner, btn) {
            if (btn.classList.contains('active')) return;
            btn.classList.add('active');
            
            await _supabase.rpc('increment_likes', { post_id: postId.toString() });
            if (postOwner !== currentUser) {
                await _supabase.from('notificaciones').insert([{
                    propietario_usuario: postOwner,
                    autor_usuario: currentUser,
                    tipo: 'like',
                    post_id: postId
                }]);
            }
            document.getElementById(`likes-${postId}`).innerText = parseInt(document.getElementById(`likes-${postId}`).innerText) + 1;
        }

        async function checkLikeStatus(postId, btn) {
            const { data } = await _supabase.from('likes').select('id').eq('user_id', currentUserId).eq('post_id', postId).maybeSingle();
            if (data) btn.classList.add('active');
        }

        // SEARCH LOGIC
        async function searchUsers(q) {
            const res = document.getElementById('search-results');
            if (q.length < 2) { res.innerHTML = ""; return; }
            const { data } = await _supabase.from('perfiles').select('username').ilike('username', `%${q}%`).limit(10);
            res.innerHTML = "";
            data?.forEach(u => {
                const item = document.createElement('div');
                item.className = 'notification-item';
                item.onclick = () => goToUserProfile(u.username);
                item.innerHTML = `<img class="notif-avatar" src="https://ui-avatars.com/api/?name=${u.username}&background=random&color=fff"><div class="notif-content"><span class="notif-user">@${u.username}</span></div>`;
                res.appendChild(item);
            });
        }

        // INBOX LOGIC
        async function loadNotifications() {
            const list = document.getElementById('notifications-list');
            list.innerHTML = "";
            const { data } = await _supabase.from('notificaciones').select('*, publicaciones(url, tipo)').eq('propietario_usuario', currentUser).order('created_at', { ascending: false });
            if (!data || data.length === 0) { list.innerHTML = "<p style='text-align:center; padding:20px; color:#444;'>Sin novedades</p>"; return; }
            data.forEach(n => {
                const div = document.createElement('div');
                div.className = 'notification-item';
                div.innerHTML = `
                    <img class="notif-avatar" src="https://ui-avatars.com/api/?name=${n.autor_usuario}&background=random&color=fff">
                    <div class="notif-content">
                        <span class="notif-user">@${n.autor_usuario}</span> ${n.tipo === 'like' ? 'le dio me gusta a tu video' : 'comentó'}
                        ${n.comentario ? `<span class="notif-comment">${n.comentario}</span>` : ''}
                    </div>
                    <img class="notif-post-preview" src="${n.publicaciones?.url}">
                `;
                list.appendChild(div);
            });
        }

        // PROFILE LOGIC
        async function goToMyProfile() {
            document.getElementById('prof-user').innerText = "@" + currentUser;
            document.getElementById('btn-back-profile').style.display = 'none';
            document.getElementById('btn-logout').style.display = 'block';
            showScreen('profile');
            loadUserPosts(currentUser);
        }

        async function goToUserProfile(user) {
            document.getElementById('prof-user').innerText = "@" + user;
            document.getElementById('btn-back-profile').style.display = 'block';
            document.getElementById('btn-logout').style.display = 'none';
            showScreen('profile');
            loadUserPosts(user);
        }

        async function loadUserPosts(user) {
            const grid = document.getElementById('profile-grid');
            grid.innerHTML = "";
            const { data } = await _supabase.from('publicaciones').select('*').eq('usuario', user).eq('estado', 'aprobado');
            data?.forEach(p => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.innerHTML = p.tipo === 'video' ? `<video src="${p.url}#t=0.1"></video>` : `<img src="${p.url}">`;
                grid.appendChild(item);
            });
        }

        // OBSERVER & UTILS
        function initObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const v = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        if(v) v.play();
                        _supabase.from('vistan_historial').insert([{ user_id: currentUserId, post_id: entry.target.dataset.id }]);
                    } else if(v) v.pause();
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.post-card').forEach(c => obs.observe(c));
        }

        async function handleAuth(type) {
            const email = type === 'reg' ? document.getElementById('r-email').value : document.getElementById('email').value;
            const pass = type === 'reg' ? document.getElementById('r-pass').value : document.getElementById('pass').value;
            if (type === 'reg') {
                const user = document.getElementById('r-user').value;
                const { data } = await _supabase.auth.signUp({ email, password: pass });
                if (data.user) await _supabase.from('perfiles').insert([{ id: data.user.id, username: user }]);
            } else {
                await _supabase.auth.signInWithPassword({ email, password: pass });
            }
            location.reload();
        }

        function toggleAuth(isReg) {
            document.getElementById('login-form').style.display = isReg ? 'none' : 'block';
            document.getElementById('reg-form').style.display = isReg ? 'block' : 'none';
        }

        async function logout() { await _supabase.auth.signOut(); location.reload(); }

        document.getElementById('file-input').onchange = (e) => {
            selectedFile = e.target.files[0];
            if(selectedFile) {
                document.getElementById('preview-box').innerHTML = selectedFile.type.includes('video') ? `<video src="${URL.createObjectURL(selectedFile)}" autoplay muted loop style="width:100%;height:100%;object-fit:cover;"></video>` : `<img src="${URL.createObjectURL(selectedFile)}" style="width:100%;height:100%;object-fit:cover;">`;
                showScreen('upload');
            }
        };

        async function startUpload() {
            document.getElementById('loading').style.display = 'flex';
            const path = Date.now() + "_" + selectedFile.name;
            await _supabase.storage.from('mely_media').upload(path, selectedFile);
            const { data } = _supabase.storage.from('mely_media').getPublicUrl(path);
            await _supabase.from('publicaciones').insert([{ 
                usuario: currentUser, url: data.publicUrl, 
                tipo: selectedFile.type.includes('video') ? 'video' : 'imagen',
                descripcion: document.getElementById('post-desc').value,
                estado: 'pendiente'
            }]);
            location.reload();
        }

        init();
    </script>
</body>
</html>
