<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA MELY | TV</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Montserrat', sans-serif; }

        /* --- FEED TIKTOK --- */
        #feed-container { 
            width: 100%; height: calc(100dvh - 65px); overflow-y: scroll; 
            snap-type: y mandatory; scroll-behavior: smooth; scrollbar-width: none; overscroll-behavior-y: contain; 
        }
        #feed-container::-webkit-scrollbar { display: none; }

        .post-card { 
            width: 100%; height: calc(100dvh - 65px); snap-align: start; snap-stop: always; 
            position: relative; background: #000; display: flex; align-items: center; justify-content: center;
        }
        .video-player { width: 100%; height: 100%; object-fit: cover; }

        /* --- UI CONTROLES --- */
        .ui-info { position: absolute; bottom: 40px; left: 15px; pointer-events: none; z-index: 10; text-shadow: 2px 2px 8px rgba(0,0,0,1); max-width: 70%; }
        .ui-info h2 { font-family: 'Oswald'; color: #d4af37; font-size: 1.4rem; margin-bottom: 5px; }
        
        .side-actions { position: absolute; right: 10px; bottom: 80px; display: flex; flex-direction: column; align-items: center; gap: 18px; z-index: 20; }
        .action-btn { background: none; border: none; color: #fff; font-size: 2.2rem; cursor: pointer; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5)); }
        .btn-delete { color: #ff4444 !important; font-size: 1.8rem !important; }

        /* --- NAVEGACION (Fija siempre) --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-item { text-align: center; color: #888; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 3px; }
        
        .plus-btn { width: 45px; height: 30px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; position: relative; margin: 0 auto; }
        .plus-btn::before { content:''; position:absolute; left:-3px; width:100%; height:100%; background:#20f3ea; border-radius:10px; z-index:-1; }
        .plus-btn::after { content:''; position:absolute; right:-3px; width:100%; height:100%; background:#ff0050; border-radius:10px; z-index:-1; }

        /* --- PANTALLAS --- */
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: calc(100dvh - 65px); display: none; flex-direction: column; background: #000; z-index: 100; overflow-y: auto; }
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .grid-item { aspect-ratio: 9/16; background: #111; overflow: hidden; cursor: pointer; }
        .grid-item video, .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* MODAL VISOR (Por encima de la nav) */
        #viewer-modal { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; }
        .viewer-close { position: absolute; top: 20px; left: 20px; font-size: 2rem; z-index: 3100; color: #fff; cursor: pointer; }
        
        /* Ajuste para que el post se vea bien en el visor */
        #viewer-content .post-card { height: 100dvh !important; }

        #loading { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 4000; display: none; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="loading">
        <div style="border:4px solid #d4af37; border-top:4px solid transparent; width:50px; height:50px; border-radius:50%; animation:spin 1s linear infinite"></div>
    </div>

    <!-- AUTH -->
    <div id="auth-screen" class="screen" style="display:flex; height:100dvh; z-index:5000; align-items:center; justify-content:center;">
        <div id="login-form" style="width:85%; text-align:center;">
            <h1 style="font-family:'Oswald'; color:#d4af37; font-size:3rem; margin-bottom:20px;">LA MELY</h1>
            <input type="email" id="email" placeholder="Correo" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:10px;">
            <input type="password" id="pass" placeholder="Contraseña" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:15px;">
            <button onclick="handleAuth('login')" style="width:100%; padding:16px; background:#d4af37; border:none; border-radius:50px; font-weight:800; cursor:pointer;">ENTRAR</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-content">
        <!-- FEED -->
        <div id="feed-screen" style="display:block;">
            <div id="feed-container"></div>
        </div>

        <!-- PERFIL -->
        <div id="profile-screen" class="screen">
            <div style="padding: 40px 20px; text-align: center;">
                <div style="width:80px; height:80px; background:#222; border-radius:50%; margin: 0 auto 10px; display:flex; align-items:center; justify-content:center; font-size:2rem; color:#d4af37;"><i class="fas fa-user"></i></div>
                <h1 id="prof-user" style="font-family:'Oswald'; color:#d4af37;">@Usuario</h1>
                <button onclick="logout()" style="color:#666; background:none; border:none; margin-top:10px;">Cerrar Sesión</button>
            </div>
            <div class="profile-grid" id="profile-grid"></div>
        </div>

        <!-- SUBIDA -->
        <div id="upload-screen" class="screen" style="padding:20px;">
            <div id="preview-box" style="width:100%; aspect-ratio:9/16; background:#111; border-radius:15px; overflow:hidden;"></div>
            <textarea id="post-desc" style="width:100%; background:#222; color:#fff; padding:15px; margin-top:15px; border-radius:10px; border:none;" placeholder="Descripción..."></textarea>
            <button onclick="startUpload()" style="margin-top:15px; width:100%; padding:18px; background:#d4af37; border:none; border-radius:12px; font-weight:bold;">PUBLICAR</button>
            <button onclick="location.reload()" style="background:none; border:none; color:#888; margin-top:15px; width:100%;">Cancelar</button>
        </div>

        <!-- BARRA NAVEGACION -->
        <div class="bottom-nav">
            <div class="nav-item active" id="nav-home" onclick="showScreen('feed')"><i class="fas fa-home"></i>Inicio</div>
            <div class="nav-item" onclick="document.getElementById('file-input').click()"><div class="plus-btn"><i class="fas fa-plus" style="color:#000;"></i></div></div>
            <div class="nav-item" id="nav-profile-btn" onclick="showScreen('profile')"><i class="fas fa-user"></i>Perfil</div>
        </div>
    </div>

    <!-- MODAL VISOR -->
    <div id="viewer-modal">
        <i class="fas fa-arrow-left viewer-close" onclick="closeViewer()"></i>
        <div id="viewer-content"></div>
    </div>

    <input type="file" id="file-input" accept="video/*,image/*" style="display:none">

    <script>
        const SB_URL = 'https://meiwuluwrdjszxeyoqtt.supabase.co';
        const SB_KEY = 'sb_publishable_gZgGIamNJqf8ir8vvt1OTw_bJ-rosi4';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let selectedFile = null;

        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                const { data } = await _supabase.from('perfiles').select('username').eq('id', session.user.id).single();
                currentUser = data?.username || "usuario";
                document.getElementById('prof-user').innerText = "@" + currentUser;
                document.getElementById('auth-screen').style.display = 'none';
                loadFeed();
            }
        }

        function showScreen(id) {
            // Ocultar todas las pantallas extra
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            // Controlar el feed
            document.getElementById('feed-screen').style.display = (id === 'feed') ? 'block' : 'none';
            // Mostrar la seleccionada si no es feed
            if(id !== 'feed') document.getElementById(id + '-screen').style.display = 'flex';
            
            // Actualizar botones nav
            document.getElementById('nav-home').classList.toggle('active', id === 'feed');
            document.getElementById('nav-profile-btn').classList.toggle('active', id === 'profile');

            if(id === 'profile') loadUserPosts();
        }

        async function loadFeed() {
            const { data } = await _supabase.from('publicaciones').select('*').eq('estado', 'aprobado').order('created_at', { ascending: false });
            const container = document.getElementById('feed-container');
            container.innerHTML = "";
            data?.forEach(post => renderPost(post, container));
            initObserver();
        }

        async function loadUserPosts() {
            const { data } = await _supabase.from('publicaciones').select('*').eq('usuario', currentUser).order('created_at', { ascending: false });
            const grid = document.getElementById('profile-grid');
            grid.innerHTML = "";
            data?.forEach(post => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.onclick = () => openViewer(post);
                item.innerHTML = post.tipo === 'video' ? `<video src="${post.url}#t=0.1" muted></video>` : `<img src="${post.url}">`;
                grid.appendChild(item);
            });
        }

        function renderPost(post, container) {
            const card = document.createElement('div');
            card.className = 'post-card';
            card.id = `post-${post.id}`;
            card.setAttribute('data-id', post.id);
            const isOwner = post.usuario === currentUser;

            card.innerHTML = `
                ${post.tipo === 'video' ? `<video class="video-player" src="${post.url}" loop playsinline></video>` : `<img class="video-player" src="${post.url}">`}
                <div class="side-actions">
                    <div class="action-item"><button class="action-btn" onclick="handleLike('${post.id}', this)"><i class="fas fa-heart"></i></button><span>${post.likes || 0}</span></div>
                    ${isOwner ? `<button class="action-btn btn-delete" onclick="deletePost('${post.id}', '${post.url}')"><i class="fas fa-trash-alt"></i></button>` : ''}
                </div>
                <div class="ui-info"><h2>@${post.usuario}</h2><p>${post.descripcion || ''}</p></div>
            `;
            container.appendChild(card);
        }

        function openViewer(post) {
            const modal = document.getElementById('viewer-modal');
            const content = document.getElementById('viewer-content');
            modal.style.display = 'block';
            content.innerHTML = "";
            renderPost(post, content);
            const v = content.querySelector('video');
            if(v) { v.muted = false; v.play(); }
        }

        function closeViewer() {
            document.getElementById('viewer-modal').style.display = 'none';
            document.getElementById('viewer-content').innerHTML = "";
        }

        async function handleAuth(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            const { error } = await _supabase.auth.signInWithPassword({ email: e, password: p });
            if(error) alert("Error"); else location.reload();
        }

        async function deletePost(id, url) {
            if(!confirm("¿Borrar?")) return;
            await _supabase.from('publicaciones').delete().eq('id', id);
            location.reload();
        }

        function logout() { _supabase.auth.signOut(); location.reload(); }

        document.getElementById('file-input').onchange = (e) => {
            selectedFile = e.target.files[0];
            if(selectedFile) {
                const url = URL.createObjectURL(selectedFile);
                document.getElementById('preview-box').innerHTML = selectedFile.type.includes('video') ? `<video src="${url}" autoplay muted loop style="width:100%; height:100%; object-fit:cover;"></video>` : `<img src="${url}" style="width:100%; height:100%; object-fit:cover;">`;
                showScreen('upload');
            }
        };

        async function startUpload() {
            document.getElementById('loading').style.display = 'flex';
            const fName = Date.now() + "_" + selectedFile.name;
            await _supabase.storage.from('mely_media').upload(fName, selectedFile);
            const { data } = _supabase.storage.from('mely_media').getPublicUrl(fName);
            await _supabase.from('publicaciones').insert([{ 
                usuario: currentUser, url: data.publicUrl, 
                tipo: selectedFile.type.includes('video') ? 'video' : 'imagen', 
                descripcion: document.getElementById('post-desc').value, 
                estado: 'pendiente' 
            }]);
            location.reload();
        }

        function initObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const v = entry.target.querySelector('video');
                    if (v) entry.isIntersecting ? v.play() : v.pause();
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.post-card').forEach(c => obs.observe(c));
        }

        init();
    </script>
</body>
</html>
