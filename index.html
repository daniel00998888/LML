<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA MELY | TV</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ESTILOS CORE - RESPETANDO TU DISEÑO */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Montserrat', sans-serif; }
        
        #app-viewport { width: 100%; height: calc(100dvh - 65px); position: relative; overflow: hidden; }
        
        /* FEED SCROLL (TU LÓGICA ORIGINAL) */
        #feed-screen { width: 100%; height: 100%; display: block; }
        #feed-container { width: 100%; height: 100%; overflow-y: scroll; snap-type: y mandatory; scrollbar-width: none; overscroll-behavior-y: contain; }
        #feed-container::-webkit-scrollbar { display: none; }
        .post-card { width: 100%; height: 100%; snap-align: start; snap-stop: always; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        .video-player { width: 100%; height: 100%; object-fit: cover; }

        /* UI OVERLAYS */
        .ui-info { position: absolute; bottom: 40px; left: 15px; z-index: 10; text-shadow: 2px 2px 8px rgba(0,0,0,1); max-width: 70%; }
        .ui-info h2 { font-family: 'Oswald'; color: #d4af37; font-size: 1.4rem; margin-bottom: 5px; cursor: pointer; }
        .side-actions { position: absolute; right: 10px; bottom: 80px; display: flex; flex-direction: column; align-items: center; gap: 18px; z-index: 20; }
        .action-item { display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; font-weight: bold; }
        .action-btn { background: none; border: none; color: #fff; font-size: 2.2rem; cursor: pointer; transition: 0.2s; }
        .action-btn.active { color: #ff0050 !important; }

        /* PANTALLAS (SCREENS) */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; background: #000; z-index: 1500; overflow-y: auto; }
        
        /* BUSCADOR */
        #search-header { padding: 15px; background: #000; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 10; }
        #search-input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; border-radius: 8px; color: #fff; outline: none; }
        .search-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #111; cursor: pointer; }
        .search-item img { width: 45px; height: 45px; border-radius: 50%; margin-right: 15px; border: 1px solid #d4af37; }

        /* BANDEJA */
        .notif-item { padding: 15px; border-bottom: 1px solid #111; display: flex; align-items: center; gap: 15px; animation: fadeIn 0.3s; }
        .notif-dot { width: 10px; height: 10px; background: #d4af37; border-radius: 50%; box-shadow: 0 0 5px #d4af37; }

        /* NAVBAR */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-item { text-align: center; color: #888; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 3px; }
        .plus-btn { width: 45px; height: 30px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #000; margin: 0 auto; }

        /* PERFIL */
        .profile-header { padding: 40px 20px; text-align: center; }
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .grid-item { aspect-ratio: 9/16; background: #111; overflow: hidden; position: relative; }
        .grid-item video, .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* CARGANDO Y ALERTAS */
        #loading { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="loading">
        <i class="fas fa-circle-notch fa-spin fa-3x" style="color:#d4af37"></i>
        <p style="margin-top:15px; color:#d4af37; font-weight:bold; letter-spacing:2px;">CONECTANDO...</p>
    </div>

    <!-- SISTEMA DE AUTH (INICIO/REGISTRO) -->
    <div id="auth-screen" class="screen" style="display:flex; align-items:center; justify-content:center; z-index:9000;">
        <div style="width:85%; max-width:350px; text-align:center;">
            <h1 style="font-family:'Oswald'; font-size:3.5rem; color:#d4af37; margin-bottom:10px; letter-spacing:5px;">LA MELY</h1>
            <p style="color:#555; margin-bottom:30px; font-size:0.8rem;">VIDEO & FUN PLATFORM</p>
            
            <div id="auth-box">
                <div id="reg-only" style="display:none;">
                    <input type="text" id="auth-user" placeholder="Nombre de usuario" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:10px;">
                </div>
                <input type="email" id="auth-email" placeholder="Correo electrónico" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:10px;">
                <input type="password" id="auth-pass" placeholder="Contraseña" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:15px;">
                
                <button id="auth-btn" onclick="handleAuthAction()" style="width:100%; padding:16px; background:#d4af37; border:none; border-radius:50px; font-weight:800; color:#000; cursor:pointer; text-transform:uppercase;">Entrar</button>
                
                <p id="auth-toggle-text" style="margin-top:20px; color:#666" onclick="toggleAuthMode()">
                    ¿No tienes cuenta? <span style="color:#d4af37; cursor:pointer;">Regístrate</span>
                </p>
            </div>
        </div>
    </div>

    <div id="app-viewport">
        <!-- PANTALLA: FEED -->
        <div id="feed-screen">
            <div id="feed-container"></div>
        </div>

        <!-- PANTALLA: BUSCADOR -->
        <div id="search-screen" class="screen">
            <div id="search-header">
                <input type="text" id="search-input" placeholder="Buscar creadores o amigos..." oninput="searchUsers(this.value)">
            </div>
            <div id="search-results"></div>
        </div>

        <!-- PANTALLA: BANDEJA -->
        <div id="inbox-screen" class="screen">
            <div style="padding:20px; border-bottom:1px solid #222;"><h2 style="font-family:'Oswald'; color:#d4af37;">NOTIFICACIONES</h2></div>
            <div id="notif-list"></div>
        </div>

        <!-- PANTALLA: PERFIL -->
        <div id="profile-screen" class="screen">
            <div class="profile-header">
                <div style="font-size: 4.5rem; color: #d4af37;"><i class="fas fa-user-circle"></i></div>
                <h1 id="prof-display-user" style="font-family:'Oswald'; font-size:1.8rem; margin-top:10px;">@Usuario</h1>
                <button onclick="logout()" style="margin-top:15px; background:#111; border:1px solid #333; color:#888; padding:8px 20px; border-radius:20px; cursor:pointer;">Cerrar Sesión</button>
            </div>
            <div class="profile-grid" id="profile-grid"></div>
        </div>
    </div>

    <!-- NAVBAR GLOBAL -->
    <div class="bottom-nav" id="main-nav" style="display:none;">
        <div class="nav-item active" id="nav-feed" onclick="showScreen('feed')"><i class="fas fa-home"></i>Inicio</div>
        <div class="nav-item" id="nav-search" onclick="showScreen('search')"><i class="fas fa-search"></i>Descubrir</div>
        <div class="nav-item" onclick="document.getElementById('file-input').click()"><div class="plus-btn"><i class="fas fa-plus"></i></div></div>
        <div class="nav-item" id="nav-inbox" onclick="showScreen('inbox')"><i class="fas fa-comment-dots"></i>Bandeja</div>
        <div class="nav-item" id="nav-profile" onclick="showScreen('profile')"><i class="fas fa-user"></i>Perfil</div>
    </div>

    <input type="file" id="file-input" accept="video/*,image/*" style="display:none">

    <script>
        const SB_URL = 'https://meiwuluwrdjszxeyoqtt.supabase.co';
        const SB_KEY = 'sb_publishable_gZgGIamNJqf8ir8vvt1OTw_bJ-rosi4';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let currentUserId = null;
        let isRegister = false;

        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                currentUserId = session.user.id;
                // Obtener el perfil real
                const { data: profile } = await _supabase.from('perfiles').select('username').eq('id', currentUserId).single();
                currentUser = profile?.username || "Usuario";
                
                document.getElementById('prof-display-user').innerText = "@" + currentUser;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-nav').style.display = 'flex';
                
                loadFeed();
                loadNotifs();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('main-nav').style.display = 'none';
            }
        }

        // --- AUTH LOGIC ---
        function toggleAuthMode() {
            isRegister = !isRegister;
            document.getElementById('reg-only').style.display = isRegister ? 'block' : 'none';
            document.getElementById('auth-btn').innerText = isRegister ? 'Crear Cuenta' : 'Entrar';
            document.getElementById('auth-toggle-text').innerHTML = isRegister ? 
                '¿Ya tienes cuenta? <span style="color:#d4af37">Inicia Sesión</span>' : 
                '¿No tienes cuenta? <span style="color:#d4af37">Regístrate</span>';
        }

        async function handleAuthAction() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const user = document.getElementById('auth-user').value;

            if(!email || !pass || (isRegister && !user)) return alert("Completa todos los campos");
            
            document.getElementById('loading').style.display = 'flex';

            if(isRegister) {
                const { data, error } = await _supabase.auth.signUp({ 
                    email, password: pass, options: { data: { username: user } } 
                });
                if(error) alert("Error: " + error.message);
                else {
                    await _supabase.from('perfiles').insert([{ id: data.user.id, username: user }]);
                    alert("¡Registro exitoso! Ya puedes entrar.");
                    location.reload();
                }
            } else {
                const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
                if(error) alert("Correo o contraseña incorrectos");
                else location.reload();
            }
            document.getElementById('loading').style.display = 'none';
        }

        // --- SEARCH LOGIC ---
        async function searchUsers(term) {
            const box = document.getElementById('search-results');
            if(term.length < 2) { box.innerHTML = ""; return; }

            const { data } = await _supabase.from('perfiles')
                .select('username')
                .ilike('username', `%${term}%`)
                .limit(10);

            box.innerHTML = "";
            data?.forEach(u => {
                const div = document.createElement('div');
                div.className = 'search-item';
                div.innerHTML = `
                    <img src="https://ui-avatars.com/api/?name=${u.username}&background=random&color=fff">
                    <span><b>@${u.username}</b></span>
                `;
                div.onclick = () => { alert("Viendo a " + u.username); };
                box.appendChild(div);
            });
        }

        // --- NOTIFICATIONS LOGIC ---
        async function loadNotifs() {
            const container = document.getElementById('notif-list');
            const { data, error } = await _supabase.from('notificaciones')
                .select('*')
                .eq('user_id', currentUserId)
                .order('created_at', {ascending: false});

            if(!data || data.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#333; margin-top:50px;">No tienes notificaciones nuevas.</p>`;
                return;
            }

            container.innerHTML = data.map(n => `
                <div class="notif-item">
                    <div class="notif-dot"></div>
                    <div>
                        <p style="font-size:0.9rem;">${n.mensaje}</p>
                        <small style="color:#555;">${new Date(n.created_at).toLocaleString()}</small>
                    </div>
                </div>
            `).join('');
        }

        // --- FEED LOGIC (TU LÓGICA DE SCROLL) ---
        async function loadFeed() {
            const container = document.getElementById('feed-container');
            const { data } = await _supabase.from('publicaciones')
                .select('*')
                .eq('estado', 'aprobado')
                .order('created_at', {ascending: false});

            container.innerHTML = "";
            if(!data) return;

            data.forEach(post => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    ${post.tipo === 'video' ? `<video class="video-player" src="${post.url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>` : `<img class="video-player" src="${post.url}">`}
                    <div class="side-actions">
                        <div class="action-item"><button class="action-btn"><i class="fas fa-heart"></i></button><span>${post.likes || 0}</span></div>
                        <div class="action-item"><button class="action-btn"><i class="fas fa-comment-dots"></i></button><span>${post.comentarios_count || 0}</span></div>
                    </div>
                    <div class="ui-info">
                        <h2 onclick="alert('Perfil de @${post.usuario}')">@${post.usuario}</h2>
                        <p>${post.descripcion || ''}</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- NAVIGATION ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById('feed-screen').style.display = id === 'feed' ? 'block' : 'none';
            if(id !== 'feed') document.getElementById(id + '-screen').style.display = 'flex';

            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');

            if(id === 'profile') loadProfileGrid();
            if(id === 'inbox') loadNotifs();
        }

        async function loadProfileGrid() {
            const grid = document.getElementById('profile-grid');
            const { data } = await _supabase.from('publicaciones').select('*').eq('usuario', currentUser);
            grid.innerHTML = data?.map(p => `
                <div class="grid-item">${p.tipo === 'video' ? `<video src="${p.url}#t=0.1"></video>` : `<img src="${p.url}">`}</div>
            `).join('') || "";
        }

        async function logout() { await _supabase.auth.signOut(); location.reload(); }

        init();
    </script>
</body>
</html>
