<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA MELY | Oficial</title>
    <!-- Usaremos Oswald para claridad y Montserrat para el resto -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --negro-mate: #121212;
            --dorado-metal: #d4af37;
            --blanco-puro: #ffffff;
            --gris-plata: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--negro-mate);
            color: var(--blanco-puro);
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
        }

        /* Header con tipografía legible pero con impacto */
        header {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #1a1a1a, #121212);
            border-bottom: 3px solid var(--dorado-metal);
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 5rem; /* Tamaño grande para impacto */
            color: var(--dorado-metal);
            text-transform: uppercase;
            letter-spacing: 10px; /* Espaciado profesional */
            margin: 0;
            line-height: 1;
        }

        .subtitle {
            font-size: 1rem;
            color: #aaa;
            letter-spacing: 5px;
            margin-top: 15px;
            font-weight: 400;
        }

        /* Carrusel Optimizado */
        .carousel-wrapper {
            max-width: 1100px;
            margin: 40px auto;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .carousel-container {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .carousel-slide {
            min-width: 100%;
            height: 600px;
            object-fit: cover;
            filter: brightness(0.8);
            transition: filter 0.3s;
        }

        .carousel-slide:hover {
            filter: brightness(1);
        }

        /* Controles */
        .btn-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.7);
            color: var(--dorado-metal);
            border: 2px solid var(--dorado-metal);
            padding: 15px;
            cursor: pointer;
            font-size: 20px;
            z-index: 10;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-prev { left: 20px; }
        .btn-next { right: 20px; }

        .btn-nav:hover {
            background: var(--dorado-metal);
            color: #000;
        }

        footer {
            padding: 40px;
            text-align: center;
            background: #000;
            color: var(--dorado-metal);
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

    </style>
</head>
<body>

    <header>
        <h1>LA MELY</h1>
        <p class="subtitle">Las Mejores Fotos</p>
    </header>

    <div class="carousel-wrapper">
        <div class="carousel-container" id="track">
            <!-- Puedes poner muchísimas fotos aquí -->
            <img class="carousel-slide" src="InShot_20241014_171505462.png" alt="Foto 1">
            <img class="carousel-slide" src="https://via.placeholder.com/1100x600/222/d4af37?text=MELY+FOTO+2" alt="Foto 2">
            <img class="carousel-slide" src="https://via.placeholder.com/1100x600/222/d4af37?text=MELY+FOTO+3" alt="Foto 3">
            <img class="carousel-slide" src="https://via.placeholder.com/1100x600/222/d4af37?text=MELY+FOTO+4" alt="Foto 4">
            <img class="carousel-slide" src="https://via.placeholder.com/1100x600/222/d4af37?text=MELY+FOTO+5" alt="Foto 5">
        </div>

        <button class="btn-nav btn-prev" onclick="move(-1)">&#10094;</button>
        <button class="btn-nav btn-next" onclick="move(1)">&#10095;</button>
    </div>

    <footer>
        &copy; 2026 LA MELY | Mejor Barrio
    </footer>

    <script>
        const track = document.getElementById('track');
        let index = 0;
        const totalSlides = document.querySelectorAll('.carousel-slide').length;

        function move(direction) {
            index = (index + direction + totalSlides) % totalSlides;
            track.style.transform = `translateX(-${index * 100}%)`;
        }

        // Auto-reproducción
        setInterval(() => move(1), 4000);
    </script>
</body>
</html>
