<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA MELY | TV</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- RESET Y ESTRUCTURA CRÍTICA PARA EL DESLIZAMIENTO --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; /* Evita que la página rebote */
            background: #000; 
            color: #fff; 
            font-family: 'Montserrat', sans-serif; 
        }

        /* CONTENEDOR PRINCIPAL: Aquí ocurre la magia del deslizamiento */
        #feed-container { 
            width: 100%; 
            height: 100dvh; /* Altura dinámica para móviles */
            overflow-y: scroll; 
            snap-type: y mandatory; /* Obliga al deslizamiento de un solo golpe */
            scroll-snap-stop: always;
            scrollbar-width: none;
        }
        #feed-container::-webkit-scrollbar { display: none; }

        .post-card { 
            width: 100%; 
            height: 100dvh; 
            snap-align: start; 
            snap-stop: always; 
            position: relative; 
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        video, img { width: 100%; height: 100%; object-fit: cover; }

        /* --- INTERFAZ DE USUARIO --- */
        .ui-info { position: absolute; bottom: 100px; left: 15px; z-index: 10; pointer-events: none; }
        .ui-info h2 { font-family: 'Oswald'; color: #d4af37; font-size: 1.6rem; text-shadow: 2px 2px 5px #000; }

        .side-bar { position: absolute; right: 10px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        .side-btn { background: none; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; text-shadow: 2px 2px 5px #000; }

        /* --- BARRA DE NAVEGACIÓN --- */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 70px; 
            background: linear-gradient(transparent, #000); 
            display: flex; justify-content: space-around; align-items: center; z-index: 100; 
        }
        .nav-item { color: #fff; font-size: 1.4rem; cursor: pointer; opacity: 0.7; transition: 0.3s; }
        .nav-item.active { opacity: 1; color: #d4af37; }

        /* --- PANTALLAS (AUTH / UPLOAD / EDITOR) --- */
        .screen-overlay { 
            position: fixed; inset: 0; background: #000; z-index: 1000; 
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        input, textarea { 
            width: 100%; max-width: 400px; padding: 15px; margin: 10px 0; 
            background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; 
        }
        .btn-gold { 
            width: 100%; max-width: 400px; padding: 15px; background: #d4af37; 
            color: #000; border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- FEED PRINCIPAL -->
    <div id="feed-container"></div>

    <!-- NAVEGACIÓN -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="openUpload()"><i class="fas fa-plus-square"></i></div>
        <div class="nav-item" id="user-btn" onclick="toggleAuth()"><i class="fas fa-user"></i></div>
    </div>

    <!-- PANTALLA AUTH (Login / Registro) -->
    <div id="auth-screen" class="screen-overlay">
        <h1 style="font-family:'Oswald'; color:#d4af37; font-size:3rem;">LA MELY</h1>
        <div id="auth-box" style="width:100%; text-align:center;">
            <input type="text" id="reg-user" placeholder="Nombre de Usuario (Solo registro)">
            <input type="email" id="auth-email" placeholder="Correo">
            <input type="password" id="auth-pass" placeholder="Contraseña">
            <button class="btn-gold" onclick="handleAuth('login')">INICIAR SESIÓN</button>
            <p style="margin:15px; font-size:0.8rem; color:#888;" onclick="handleAuth('signup')">¿No tienes cuenta? Regístrate aquí</p>
            <button class="btn-gold" style="background:#444; color:#fff;" onclick="closeScreens()">CANCELAR</button>
        </div>
    </div>

    <!-- EDITOR DE POST (Antes de subir) -->
    <div id="editor-screen" class="screen-overlay">
        <h2 style="color:#d4af37; margin-bottom:15px;">PUBLICAR NUEVO</h2>
        <div id="preview-container" style="width:150px; height:200px; background:#222; border-radius:10px; margin-bottom:15px; overflow:hidden;"></div>
        <textarea id="post-desc" placeholder="Escribe algo sobre este video..."></textarea>
        <button class="btn-gold" id="upload-btn" onclick="uploadToSupabase()">SUBIR AHORA</button>
        <button class="btn-gold" style="background:#444; color:#fff; margin-top:10px;" onclick="closeScreens()">DESCARTAR</button>
    </div>

    <input type="file" id="file-input" accept="video/*,image/*" style="display:none" onchange="preparePost(this)">

    <script>
        const SB_URL = 'https://meiwuluwrdjszxeyoqtt.supabase.co';
        const SB_KEY = 'sb_publishable_gZgGIamNJqf8ir8vvt1OTw_bJ-rosi4';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let selectedFile = null;

        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                const { data } = await _supabase.from('perfiles').select('username').eq('id', session.user.id).single();
                currentUser = data?.username || "usuario";
                document.getElementById('user-btn').innerHTML = '<i class="fas fa-sign-out-alt"></i>';
                document.getElementById('user-btn').onclick = () => _supabase.auth.signOut().then(() => location.reload());
            }
            await loadFeed();
            setupRealtime();
        }

        // --- SISTEMA DE CARGA Y DESLIZAMIENTO ---
        async function loadFeed() {
            const { data } = await _supabase.from('publicaciones')
                .select('*')
                .eq('estado', 'aprobado')
                .order('created_at', { ascending: false });
            
            const container = document.getElementById('feed-container');
            container.innerHTML = "";
            data?.forEach(post => renderPost(post));
            setupObserver();
        }

        function renderPost(post, prepend = false) {
            const container = document.getElementById('feed-container');
            const card = document.createElement('div');
            card.className = 'post-card';
            card.id = `post-${post.id}`;
            card.innerHTML = `
                ${post.tipo === 'video' 
                    ? `<video src="${post.url}" loop playsinline onclick="togglePlay(this)"></video>` 
                    : `<img src="${post.url}">`}
                <div class="side-bar">
                    <button class="side-btn"><i class="fas fa-heart"></i></button>
                    <button class="side-btn"><i class="fas fa-comment"></i></button>
                    <button class="side-btn"><i class="fas fa-share"></i></button>
                </div>
                <div class="ui-info">
                    <h2>@${post.usuario}</h2>
                    <p>${post.descripcion || ''}</p>
                </div>
            `;
            if (prepend) {
                container.prepend(card);
                container.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                container.appendChild(card);
            }
        }

        // --- REALTIME (SUBIDA EN TIEMPO REAL) ---
        function setupRealtime() {
            _supabase.channel('custom-all-channel')
            .on('postgres_changes', { event: 'INSERT', table: 'publicaciones', schema: 'public' }, (payload) => {
                if (payload.new.estado === 'aprobado') renderPost(payload.new, true);
            })
            .on('postgres_changes', { event: 'UPDATE', table: 'publicaciones', schema: 'public' }, (payload) => {
                if (payload.new.estado === 'aprobado') renderPost(payload.new, true);
            })
            .subscribe();
        }

        // --- FUNCIONES DE AUTH ---
        async function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const user = document.getElementById('reg-user').value;

            if (type === 'signup') {
                const { data, error } = await _supabase.auth.signUp({ email, password: pass });
                if (error) return alert(error.message);
                await _supabase.from('perfiles').insert({ id: data.user.id, username: user });
                alert("Cuenta creada. Por favor inicia sesión.");
            } else {
                const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
                if (error) alert(error.message); else location.reload();
            }
        }

        // --- EDITOR Y SUBIDA ---
        function openUpload() {
            if (!currentUser) return toggleAuth();
            document.getElementById('file-input').click();
        }

        function preparePost(input) {
            selectedFile = input.files[0];
            if (!selectedFile) return;
            
            const preview = document.getElementById('preview-container');
            const url = URL.createObjectURL(selectedFile);
            preview.innerHTML = selectedFile.type.includes('video') 
                ? `<video src="${url}" muted autoplay loop style="width:100%; height:100%; object-fit:cover;"></video>`
                : `<img src="${url}" style="width:100%; height:100%; object-fit:cover;">`;
            
            document.getElementById('editor-screen').style.display = 'flex';
        }

        async function uploadToSupabase() {
            const btn = document.getElementById('upload-btn');
            btn.innerText = "SUBIENDO...";
            btn.disabled = true;

            const fileName = `${Date.now()}_${selectedFile.name}`;
            const { data, error } = await _supabase.storage.from('media').upload(fileName, selectedFile);
            
            if (error) return alert("Error al subir archivo");

            const { data: { publicUrl } } = _supabase.storage.from('media').getPublicUrl(fileName);

            await _supabase.from('publicaciones').insert({
                url: publicUrl,
                usuario: currentUser,
                descripcion: document.getElementById('post-desc').value,
                tipo: selectedFile.type.includes('video') ? 'video' : 'imagen',
                estado: 'pendiente' // El admin debe aprobarlo para que aparezca en el feed
            });

            alert("¡Subido! Aparecerá cuando el admin lo apruebe.");
            location.reload();
        }

        // --- UTILIDADES ---
        function togglePlay(v) { v.paused ? v.play() : v.pause(); }
        function toggleAuth() { document.getElementById('auth-screen').style.display = 'flex'; }
        function closeScreens() { document.querySelectorAll('.screen-overlay').forEach(s => s.style.display = 'none'); }

        function setupObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (video) {
                        if (entry.isIntersecting) video.play();
                        else { video.pause(); video.currentTime = 0; }
                    }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.post-card').forEach(card => observer.observe(card));
        }

        init();
    </script>
</body>
</html>
