<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA MELY</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Montserrat', sans-serif; }
        
        #toast-container { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 10000; width: 80%; max-width: 300px; }
        .toast-msg { background: rgba(20, 20, 20, 0.95); color: #d4af37; border: 1px solid #d4af37; padding: 12px 20px; border-radius: 50px; text-align: center; font-weight: bold; font-size: 0.9rem; margin-top: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        #splash-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        .splash-logo { font-family: 'Oswald'; font-size: 4rem; color: #d4af37; letter-spacing: 8px; animation: pulse-gold 2s infinite; }
        @keyframes pulse-gold { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }

        #app-viewport { width: 100%; height: calc(100dvh - 65px); position: relative; overflow: hidden; }
        #feed-screen { width: 100%; height: 100%; display: block; }
        #feed-container { width: 100%; height: 100%; overflow-y: scroll; snap-type: y mandatory; scroll-behavior: smooth; scrollbar-width: none; overscroll-behavior-y: contain; }
        #feed-container::-webkit-scrollbar { display: none; }
        
        .post-card { width: 100%; height: 100%; snap-align: start; snap-stop: always; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        .video-player { width: 100%; height: 100%; object-fit: cover; }
        
        .ui-info { position: absolute; bottom: 45px; left: 15px; z-index: 10; text-shadow: 2px 2px 8px rgba(0,0,0,1); max-width: 70%; pointer-events: none; }
        .ui-info h2 { font-family: 'Oswald'; color: #d4af37; font-size: 1.4rem; margin-bottom: 5px; cursor: pointer; pointer-events: auto; display: inline-block; }
        
        .side-actions { position: absolute; right: 10px; bottom: 80px; display: flex; flex-direction: column; align-items: center; gap: 18px; z-index: 20; }
        .action-item { display: flex; flex-direction: column; align-items: center; color: #fff; font-size: 0.75rem; font-weight: bold; }
        .action-btn { background: none; border: none; color: #fff; font-size: 2.2rem; cursor: pointer; transition: 0.2s; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5)); }
        .action-btn.active { color: #ff0050 !important; transform: scale(1.1); }
        
        .user-avatar-btn { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; overflow: hidden; background: #333; margin-bottom: 5px; cursor: pointer; position: relative; }
        .user-avatar-btn img { width: 100%; height: 100%; object-fit: cover; }
        .user-avatar-btn::after { content: '+'; position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%); background: #ff0050; color: #fff; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; border: 1px solid #000; }
        
        .btn-delete { color: #ff4444 !important; font-size: 1.8rem !important; margin-top: 5px; opacity: 0.8; }
        
        .progress-container { position: absolute; bottom: 0; width: 100%; height: 25px; background: transparent; z-index: 100; display: flex; align-items: flex-end; cursor: pointer; }
        .progress-bg { width: 100%; height: 5px; background: rgba(255,255,255,0.2); position: relative; }
        .progress-bar { height: 100%; background: #d4af37; width: 0%; position: relative; }
        .progress-bar::after { content: ''; position: absolute; right: -5px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; background: #fff; border-radius: 50%; display: none; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .progress-container:hover .progress-bar::after { display: block; }
        
        .time-display { position: absolute; bottom: 10px; left: 15px; font-size: 11px; font-weight: bold; color: rgba(255,255,255,0.8); text-shadow: 1px 1px 2px #000; pointer-events: none; z-index: 101; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 3000; }
        .nav-item { text-align: center; color: #888; font-size: 10px; cursor: pointer; flex: 1; position: relative; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 3px; }
        
        .plus-btn { width: 45px; height: 30px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; position: relative; margin: 0 auto; }
        .plus-btn::before { content:''; position:absolute; left:-3px; width:100%; height:100%; background:#20f3ea; border-radius:10px; z-index:-1; }
        .plus-btn::after { content:''; position:absolute; right:-3px; width:100%; height:100%; background:#ff0050; border-radius:10px; z-index:-1; }
        
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; background: #000; z-index: 1500; overflow-y: auto; padding-bottom: 70px; }
        .profile-header { padding: 30px 20px; text-align: center; background: #000; position: relative; }
        .btn-back { position: absolute; top: 20px; left: 20px; font-size: 1.5rem; color: #fff; background: none; border: none; cursor: pointer; }
        
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .grid-item { aspect-ratio: 9/16; background: #111; position: relative; overflow: hidden; cursor: pointer; }
        .grid-item video, .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .grid-views { position: absolute; bottom: 5px; left: 5px; font-size: 0.75rem; color: #fff; font-weight: bold; text-shadow: 1px 1px 3px #000; z-index: 5; display: flex; align-items: center; gap: 4px; }
        
        .profile-tabs-nav { display: flex; border-top: 1px solid #222; border-bottom: 1px solid #111; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; color: #888; font-size: 1.2rem; cursor: pointer; position: relative; }
        .tab-btn.active { color: #fff; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 25%; width: 50%; height: 2px; background: #d4af37; }
        
        #viewer-modal { position: fixed; inset: 0; background: #000; z-index: 4000; display: none; }
        .viewer-close { position: absolute; top: 20px; left: 20px; font-size: 2rem; z-index: 4100; color: #fff; cursor: pointer; }
        
        #loading { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .search-panel, .notifications-panel { position: absolute; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; padding-top: 20px; padding-bottom: 70px; overflow-y: auto; }
        .panel-header { display: flex; align-items: center; padding: 10px 20px; gap: 15px; border-bottom: 1px solid #222; position: sticky; top: 0; background: #000; z-index: 10; }
        .search-box { flex: 1; background: #111; border-radius: 10px; display: flex; align-items: center; padding: 0 15px; }
        .search-box input { background: none; border: none; color: #fff; padding: 10px; width: 100%; outline: none; }
        .list-item { display: flex; align-items: center; padding: 12px 15px; gap: 12px; border-bottom: 1px solid #111; cursor: pointer; }
        .list-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid #333; }
        .list-info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
        .list-info b { font-size: 0.85rem; color: #fff; }
        .list-info span { font-size: 0.75rem; color: #888; }
        .notif-thumb { width: 45px; height: 60px; border-radius: 4px; object-fit: cover; background: #111; border: 1px solid #222; }
        
        /* ESTILO PUNTO ROJO Y CONTADOR */
        .notif-badge { 
            background: #ff0050; 
            color: #fff; 
            font-size: 10px; 
            font-weight: bold;
            min-width: 18px;
            height: 18px;
            padding: 0 4px;
            border-radius: 50%; 
            position: absolute; 
            top: 5px; 
            right: 20%; 
            display: none; 
            border: 2px solid #000;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="splash-screen">
        <div class="splash-logo">LA MELY</div>
        <div style="border:3px solid #d4af37; border-top:3px solid transparent; width:30px; height:30px; border-radius:50%; animation:spin 1s linear infinite; margin-top:20px;"></div>
    </div>

    <div id="loading">
        <div style="border:4px solid #d4af37; border-top:4px solid transparent; width:50px; height:50px; border-radius:50%; animation:spin 1s linear infinite"></div>
        <p style="margin-top:15px; color:#d4af37; font-weight:bold;">CARGANDO...</p>
    </div>

    <div id="auth-screen" class="screen" style="display:flex; align-items:center; justify-content:center; z-index:9000; padding-bottom: 0;">
        <div style="font-family:'Oswald'; font-size:3.5rem; color:#d4af37; letter-spacing:5px;">LA MELY</div>
        <div id="login-msg" style="display:none; color:#fff; font-size:0.9rem; margin-top:-10px; margin-bottom:20px; font-weight:bold; text-align:center;">inicia sesion para ver los videos y fotos de la mely</div>
        <div id="reg-msg" style="color:#fff; font-size:0.9rem; margin-top:-10px; margin-bottom:20px; font-weight:bold; text-align:center;">registrate para ver los videos y fotos de la mely</div>

        <div id="login-form" style="display:none; width:85%; max-width:350px; text-align:center;">
            <input type="email" id="email" placeholder="Correo" autocomplete="email" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:10px;">
            <input type="password" id="pass" placeholder="Contraseña" autocomplete="current-password" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:15px;">
            <button id="btn-login-action" onclick="handleAuth('login')" style="width:100%; padding:16px; background:#d4af37; border:none; border-radius:50px; font-weight:800; text-transform:uppercase; cursor:pointer;">Entrar</button>
            <p style="margin-top:20px; color:#666" onclick="toggleAuth(true)">¿Nuevo aquí? <span style="color:#d4af37">Regístrate</span></p>
        </div>

        <div id="reg-form" style="width:85%; max-width:350px; text-align:center;">
            <input type="text" id="r-user" placeholder="Nombre de usuario" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:10px;">
            <input type="email" id="r-email" placeholder="Correo" autocomplete="email" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:10px;">
            <input type="password" id="r-pass" placeholder="Contraseña" autocomplete="new-password" style="width:100%; padding:15px; background:#111; border:1px solid #222; color:#fff; border-radius:12px; margin-bottom:15px;">
            <button onclick="handleAuth('reg')" style="width:100%; padding:16px; background:#d4af37; border:none; border-radius:50px; font-weight:800; text-transform:uppercase; cursor:pointer;">Crear Cuenta</button>
            <p style="margin-top:20px; color:#666" onclick="toggleAuth(false)">¿Ya tienes cuenta? <span style="color:#d4af37">Inicia Sesión</span></p>
        </div>
    </div>

    <div id="app-viewport">
        <div id="feed-screen">
            <div id="feed-container"></div>
        </div>

        <div id="profile-screen" class="screen">
            <div class="profile-header">
                <button class="btn-back" id="btn-back-profile" onclick="showScreen('feed')" style="display:none;"><i class="fas fa-arrow-left"></i></button>
                <div style="font-size: 3.5rem; color: #d4af37;"><i class="fas fa-user-circle"></i></div>
                <h1 id="prof-user" style="font-family:'Oswald'; font-size:1.8rem; color:#d4af37;">@Usuario</h1>
                <button id="btn-logout" onclick="logout()" style="background:none; border:1px solid #333; color:#888; padding:5px 15px; border-radius:5px; margin-top:10px; cursor:pointer;">Cerrar Sesión</button>
            </div>
            <div class="profile-tabs-nav" id="profile-tabs">
                <button class="tab-btn active" id="tab-posts" onclick="switchProfileTab('posts')"><i class="fas fa-th"></i></button>
                <button class="tab-btn" id="tab-likes" onclick="switchProfileTab('likes')"><i class="fas fa-heart"></i></button>
            </div>
            <div class="profile-grid" id="profile-grid"></div>
        </div>

        <div id="upload-screen" class="screen" style="padding:20px; justify-content: center;">
            <div style="width:100%; height:45vh; background:#111; border-radius:15px; overflow:hidden;" id="preview-box"></div>
            <textarea id="post-desc" style="width:100%; background:#222; border:none; color:#fff; padding:15px; margin-top:15px; border-radius:10px; font-family:inherit; resize:none;" placeholder="Escribe algo sobre este video..."></textarea>
            <button id="btn-upload-final" style="margin-top:15px; width:100%; padding:18px; background:#d4af37; border:none; border-radius:12px; font-weight:bold; color:#000; cursor:pointer;" onclick="startUpload()">PUBLICAR AHORA</button>
            <button onclick="location.reload()" style="background:none; border:none; color:#888; margin-top:15px; width:100%; cursor:pointer;">Cancelar</button>
        </div>

        <div id="search-panel" class="search-panel">
            <div class="panel-header">
                <div class="search-box">
                    <i class="fas fa-search" style="color:#555"></i>
                    <input type="text" id="user-search-input" placeholder="Buscar perfiles..." oninput="searchUsers(this.value)">
                </div>
            </div>
            <div id="search-results"></div>
        </div>

        <div id="notifications-panel" class="notifications-panel">
            <div class="panel-header">
                <h2 style="font-family:'Oswald'; color:#d4af37">Bandeja de entrada</h2>
            </div>
            <div id="notif-list"></div>
        </div>
    </div>

    <div class="bottom-nav" id="main-nav" style="display:none;">
        <div class="nav-item active" id="nav-home" onclick="showScreen('feed')"><i class="fas fa-home"></i>Inicio</div>
        <div class="nav-item" id="nav-search" onclick="showScreen('search')"><i class="fas fa-search"></i>Buscar</div>
        <div class="nav-item" onclick="document.getElementById('file-input').click()"><div class="plus-btn"><i class="fas fa-plus" style="color:#000;"></i></div></div>
        <div class="nav-item" id="nav-notif" onclick="showScreen('notif')"><i class="fas fa-comment-dots"></i>Bandeja<span id="notif-count" class="notif-badge">0</span></div>
        <div class="nav-item" id="nav-profile-btn" onclick="goToMyProfile()"><i class="fas fa-user"></i>Perfil</div>
    </div>

    <div id="viewer-modal">
        <i class="fas fa-arrow-left viewer-close" onclick="closeViewer()"></i>
        <div id="viewer-content" style="width:100%; height:100%;"></div>
    </div>

    <input type="file" id="file-input" accept="video/*,image/*" style="display:none">

    <script>
        const SB_URL = 'https://meiwuluwrdjszxeyoqtt.supabase.co';
        const SB_KEY = 'sb_publishable_gZgGIamNJqf8ir8vvt1OTw_bJ-rosi4';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let currentUserId = null;
        let selectedFile = null;
        let viewingUser = null;
        let unreadNotifications = 0; // CONTADOR DE NOTIFICACIONES

        function sanitize(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function showMessage(text) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast-msg';
            let msg = text;
            if (msg.includes("at least 6 characters")) msg = "Contraseña muy corta (mínimo 6)";
            if (msg.includes("already registered")) msg = "Este correo ya existe";
            if (msg.includes("Invalid login credentials")) msg = "Correo o clave incorrectos";
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 3000);
        }

        function sharePost(post) {
            const shareUrl = `${window.location.origin}${window.location.pathname}?post_id=${post.id}`;
            const message = post.tipo === 'video' 
                ? `Checa Este Video Impresionante de la Mely 😲\n${shareUrl}`
                : `Checa Esta Foto Impresionante de la Mely 😲\n${shareUrl}`;

            if (navigator.share) {
                navigator.share({ title: 'LA MELY TV', text: message, url: shareUrl }).catch(() => {});
            } else {
                const waUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(message)}`;
                window.open(waUrl, '_blank');
            }
        }

         async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const sharedPostId = urlParams.get('post_id');
            
            if (sharedPostId) {
                localStorage.setItem('redirect_post_id', sharedPostId);
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            const { data: { session } } = await _supabase.auth.getSession();
            
            if (session) {
                currentUserId = session.user.id;
                const { data } = await _supabase.from('perfiles').select('username').eq('id', currentUserId).maybeSingle();
                
                if(!data) {
                    await logout();
                    return;
                }

                currentUser = data.username;
                
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-nav').style.display = 'flex';
                
                await loadFeed();
                setupRealtime();

                const targetPostId = localStorage.getItem('redirect_post_id');
                if (targetPostId) {
                    localStorage.removeItem('redirect_post_id'); 
                    const { data: post } = await _supabase.from('publicaciones').select('*').eq('id', targetPostId).maybeSingle();
                    if (post) openViewer(post);
                }
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('main-nav').style.display = 'none';
                toggleAuth(true); 
            }
            
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 500);
        }

        async function handleAuth(type) {
            const e = type === 'reg' ? document.getElementById('r-email').value : document.getElementById('email').value;
            const p = type === 'reg' ? document.getElementById('r-pass').value : document.getElementById('pass').value;
            if(!e || !p) return showMessage("Faltan datos");
            document.getElementById('loading').style.display = 'flex';
            if(type === 'reg'){
                const u = document.getElementById('r-user').value;
                if(!u) { document.getElementById('loading').style.display='none'; return showMessage("Pon un nombre de usuario"); }
                
                const { data: existingUser } = await _supabase.from('perfiles').select('username').eq('username', u).maybeSingle();
                if(existingUser) {
                    document.getElementById('loading').style.display = 'none';
                    return showMessage("Ese nombre ya está en uso, prueba con otro");
                }

                const { data, error } = await _supabase.auth.signUp({ 
                    email: e, 
                    password: p,
                    options: { data: { username: u, password: p } }
                });
                if (error) {
                    document.getElementById('loading').style.display = 'none';
                    showMessage(error.message);
                } else {
                    showMessage("¡Cuenta creada!");
                    setTimeout(() => location.reload(), 1500);
                }
            } else {
                const { error } = await _supabase.auth.signInWithPassword({ email: e, password: p });
                if (error) {
                    document.getElementById('loading').style.display = 'none';
                    showMessage(error.message);
                } else {
                    location.reload();
                }
            }
        }

        function toggleAuth(isReg) {
            document.getElementById('reg-form').style.display = isReg ? 'block' : 'none';
            document.getElementById('reg-msg').style.display = isReg ? 'block' : 'none';
            document.getElementById('login-form').style.display = isReg ? 'none' : 'block';
            document.getElementById('login-msg').style.display = isReg ? 'none' : 'block';
        }

        async function logout() { await _supabase.auth.signOut(); location.reload(); }

        function showScreen(id) {
            document.querySelectorAll('.screen, .search-panel, .notifications-panel').forEach(s => s.style.display = 'none');
            document.getElementById('feed-screen').style.display = id === 'feed' ? 'block' : 'none';
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(id === 'feed') document.getElementById('nav-home').classList.add('active');
            if(id === 'search') { document.getElementById('search-panel').style.display = 'flex'; document.getElementById('nav-search').classList.add('active'); }
            
            // LOGICA NOTIFICACIONES: Reiniciar al entrar[cite: 11]
            if(id === 'notif') { 
                document.getElementById('notifications-panel').style.display = 'flex'; 
                document.getElementById('nav-notif').classList.add('active'); 
                loadNotifs(); 
                unreadNotifications = 0;
                const badge = document.getElementById('notif-count');
                badge.style.display='none'; 
                badge.innerText = "0";
            }
            
            if(id === 'profile') { document.getElementById('profile-screen').style.display = 'flex'; document.getElementById('nav-profile-btn').classList.add('active'); }
            if(id === 'upload') document.getElementById('upload-screen').style.display = 'flex';
        }

        function goToMyProfile() {
            viewingUser = currentUser;
            document.getElementById('prof-user').innerText = "@" + sanitize(currentUser);
            document.getElementById('btn-back-profile').style.display = 'none';
            document.getElementById('btn-logout').style.display = 'inline-block';
            document.getElementById('profile-tabs').style.display = 'flex';
            showScreen('profile');
            switchProfileTab('posts');
        }

        function goToUserProfile(username) {
            if(username === currentUser) return goToMyProfile();
            viewingUser = username;
            document.getElementById('prof-user').innerText = "@" + sanitize(username);
            document.getElementById('btn-back-profile').style.display = 'block';
            document.getElementById('btn-logout').style.display = 'none';
            document.getElementById('profile-tabs').style.display = 'none';
            showScreen('profile');
            loadUserPosts('posts');
        }

        async function switchProfileTab(tab) {
            document.getElementById('tab-posts').classList.toggle('active', tab === 'posts');
            document.getElementById('tab-likes').classList.toggle('active', tab === 'likes');
            loadUserPosts(tab);
        }

        async function loadUserPosts(filterType = 'posts') {
            const grid = document.getElementById('profile-grid');
            grid.innerHTML = "<p style='grid-column:1/4; text-align:center; padding:20px; color:#555;'>Cargando...</p>";
            let data = [];
            
            if(filterType === 'posts') {
                const { data: posts } = await _supabase.from('publicaciones').select('*').eq('usuario', viewingUser).eq('estado', 'aprobado').order('created_at', { ascending: false });
                data = posts;
            } else {
                const { data: likedData } = await _supabase.from('likes').select('publicaciones(*)').eq('user_id', currentUserId);
                data = likedData ? likedData.map(l => l.publicaciones).filter(p => p !== null) : [];
            }
            
            grid.innerHTML = "";
            data?.forEach(post => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.onclick = () => openViewer(post);
                item.innerHTML = `
                    ${post.tipo === 'video' ? `<video src="${post.url}#t=0.1" muted></video>` : `<img src="${post.url}">`}
                    <div class="grid-views"><i class="fas fa-play"></i> ${post.vistas || 0}</div>
                `;
                grid.appendChild(item);
            });
        }

        async function searchUsers(q) {
            if (q.length < 2) return;
            const { data } = await _supabase.from('perfiles').select('username').ilike('username', `%${q}%`).limit(10);
            const res = document.getElementById('search-results'); res.innerHTML = "";
            data?.forEach(u => {
                const div = document.createElement('div'); div.className = 'list-item';
                div.onclick = () => goToUserProfile(u.username);
                div.innerHTML = `<img class="list-avatar" src="https://ui-avatars.com/api/?name=${encodeURIComponent(u.username)}&background=random"><span>@${sanitize(u.username)}</span>`;
                res.appendChild(div);
            });
        }

        async function loadNotifs() {
            const list = document.getElementById('notif-list'); 
            list.innerHTML = "";
            const { data } = await _supabase.from('likes').select('user_id, publicaciones!inner(*)').eq('publicaciones.usuario', currentUser).order('created_at', { ascending: false }).limit(20);
            if(!data || data.length === 0) {
                list.innerHTML = "<div style='padding:50px; text-align:center; color:#444;'><i class='fas fa-bell-slash' style='font-size:3rem; display:block; margin-bottom:10px;'></i>Aún no tienes notificaciones</div>";
                return;
            }
            for(let n of data) {
                const { data: prof } = await _supabase.from('perfiles').select('username').eq('id', n.user_id).maybeSingle();
                const userName = prof?.username || "Alguien";
                const post = n.publicaciones;
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<img class="list-avatar" src="https://ui-avatars.com/api/?name=${encodeURIComponent(userName)}&background=random" onclick="event.stopPropagation(); goToUserProfile('${sanitize(userName)}')"><div class="list-info" onclick='openViewer(${JSON.stringify(post)})'><b>@${sanitize(userName)}</b><span>le dio like a tu ${post.tipo === 'video' ? 'video' : 'foto'}.</span></div><img class="notif-thumb" src="${post.url}${post.tipo === 'video' ? '#t=0.5' : ''}" onclick='openViewer(${JSON.stringify(post)})'>`;
                list.appendChild(div);
            }
        }

        async function loadFeed() {
            const container = document.getElementById('feed-container');
            container.innerHTML = "";
            const { data: seenVideos } = await _supabase.from('vistan_historial').select('post_id').eq('user_id', currentUserId);
            const seenIds = seenVideos ? seenVideos.map(v => v.post_id) : [];
            let query = _supabase.from('publicaciones').select('*').eq('estado', 'aprobado').neq('usuario', currentUser).order('created_at', { ascending: false });
            if (seenIds.length > 0) query = query.not('id', 'in', `(${seenIds.join(',')})`);
            const { data, error } = await query;
            if (error || !data || data.length === 0) {
                container.innerHTML = `<div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; text-align:center;"><i class="fas fa-check-circle" style="font-size:4rem; color:#d4af37; margin-bottom:20px;"></i><h2 style="font-family:'Oswald'">¡ESTÁS AL DÍA!</h2><p style="color:#888; margin-top:10px;">Has visto todo el contenido nuevo.</p></div>`;
                return;
            }
            data.forEach(post => renderPost(post, container));
            initObserver();
        }

        function renderPost(post, container, isNew = false) {
            if (!isNew && document.getElementById(`post-${post.id}`)) return;
            const card = document.createElement('div');
            card.className = 'post-card';
            card.id = `post-${post.id}`;
            card.setAttribute('data-id', post.id);
            const isInViewer = container.id === 'viewer-content';
            const safeUser = sanitize(post.usuario);
            const navAction = isInViewer ? `closeViewer(); goToUserProfile('${safeUser}')` : `goToUserProfile('${safeUser}')`;
            card.innerHTML = `
                ${post.tipo === 'video' ? `<video class="video-player" src="${post.url}" loop playsinline></video>` : `<img class="video-player" src="${post.url}">`}
                <div class="side-actions">
                    <div class="user-avatar-btn" onclick="${navAction}"><img src="https://ui-avatars.com/api/?name=${encodeURIComponent(post.usuario)}&background=random&color=fff" alt="avatar"></div>
                    <div class="action-item"><button class="action-btn" id="btn-like-${post.id}" onclick="handleLike('${post.id}', this)"><i class="fas fa-heart"></i></button><span class="likes-count" id="likes-${post.id}">${post.likes || 0}</span></div>
                    <div class="action-item"><button class="action-btn" onclick="showMessage('Próximamente...')"><i class="fas fa-comment-dots"></i></button><span id="comm-count-${post.id}">${post.comentarios_count || 0}</span></div>
                    <div class="action-item"><button class="action-btn" onclick='sharePost(${JSON.stringify(post)})'><i class="fas fa-share"></i></button></div>
                    <div class="action-item"><i class="fas fa-play" style="font-size:1.2rem; opacity:0.5"></i><span class="vistas-count" id="vistas-${post.id}">${post.vistas || 0}</span></div>
                    ${post.usuario === currentUser ? `<button class="action-btn btn-delete" onclick="deletePost('${post.id}', '${post.url}')"><i class="fas fa-trash-alt"></i></button>` : ''}
                </div>
                <div class="ui-info"><h2 onclick="${navAction}">@${safeUser}</h2><p>${sanitize(post.descripcion || '')}</p></div>
                ${post.tipo === 'video' ? `
                <div class="time-display" id="time-${post.id}">0:00 / 0:00</div>
                <div class="progress-container" id="container-${post.id}"><div class="progress-bg"><div class="progress-bar" id="bar-${post.id}"></div></div></div>` : ''}
            `;
            isNew ? container.prepend(card) : container.appendChild(card);
            if (post.tipo === 'video') setupVideo(card, post.id);
            checkLikeStatus(post.id, card.querySelector(`#btn-like-${post.id}`));
            if(isNew) initObserver(); 
        }

        async function handleLike(postId, btn) {
            if (!currentUserId) return;
            const isLiked = btn.classList.contains('active');
            const allBtns = document.querySelectorAll(`#btn-like-${postId}`);
            const allCounts = document.querySelectorAll(`#likes-${postId}`);
            if (!isLiked) {
                allBtns.forEach(b => b.classList.add('active'));
                allCounts.forEach(c => c.innerText = parseInt(c.innerText || 0) + 1);
                await _supabase.from('likes').insert([{ user_id: currentUserId, post_id: Number(postId) }]);
                await _supabase.rpc('increment_likes', { post_id: postId.toString() });
            } else {
                allBtns.forEach(b => b.classList.remove('active'));
                allCounts.forEach(c => c.innerText = Math.max(0, parseInt(c.innerText || 0) - 1));
                await _supabase.from('likes').delete().eq('user_id', currentUserId).eq('post_id', Number(postId));
                await _supabase.rpc('decrement_likes', { post_id: postId.toString() });
            }
        }

        async function checkLikeStatus(postId, btn) {
            if (!btn || !currentUserId) return;
            const { data } = await _supabase.from('likes').select('id').eq('user_id', currentUserId).eq('post_id', Number(postId)).maybeSingle();
            if (data) btn.classList.add('active');
        }

        async function markView(postId) {
            if(!currentUserId || sessionStorage.getItem(`view_${postId}`)) return;
            sessionStorage.setItem(`view_${postId}`, 'true');
            await _supabase.rpc('increment_vistas', { post_id: postId.toString() });
            await _supabase.from('vistan_historial').insert([{ user_id: currentUserId, post_id: Number(postId) }]);
        }

        function setupVideo(card, postId) {
            const v = card.querySelector('video');
            const bar = card.querySelector('.progress-bar');
            const container = card.querySelector('.progress-container');
            const timeDisplay = card.querySelector('.time-display');
            if(!v || !container) return;
            const seek = (e) => {
                const rect = container.getBoundingClientRect();
                const pos = (e.pageX || e.touches[0].pageX) - rect.left;
                const pct = Math.max(0, Math.min(1, pos / rect.width));
                if (v.duration) v.currentTime = pct * v.duration;
            };
            let isDragging = false;
            container.onmousedown = (e) => { isDragging = true; seek(e); };
            window.addEventListener('mousemove', (e) => { if(isDragging) seek(e); });
            window.addEventListener('mouseup', () => { isDragging = false; });
            v.onclick = () => v.paused ? v.play().catch(()=>{}) : v.pause();
            v.ontimeupdate = () => {
                const pct = (v.currentTime / v.duration) * 100;
                bar.style.width = pct + "%";
                if(timeDisplay) timeDisplay.innerText = `${formatTime(v.currentTime)} / ${formatTime(v.duration)}`;
            };
        }

        function initObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const id = entry.target.getAttribute('data-id');
                    const v = entry.target.querySelector('video');
                    if (entry.isIntersecting) { if(v) v.play().catch(()=>{}); markView(id); } else if(v) v.pause(); 
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('#feed-container .post-card').forEach(c => obs.observe(c));
        }

        function openViewer(post) {
            const modal = document.getElementById('viewer-modal');
            const content = document.getElementById('viewer-content');
            modal.style.display = 'block';
            content.innerHTML = "";
            renderPost(post, content, true);
            const v = content.querySelector('video');
            if(v) { v.muted = false; v.play().catch(()=>{}); }
        }

        function closeViewer() {
            document.getElementById('viewer-modal').style.display = 'none';
            document.getElementById('viewer-content').innerHTML = "";
        }

        async function deletePost(postId, fileUrl) {
            if(!confirm("¿Eliminar publicación?")) return;
            const { error } = await _supabase.from('publicaciones').delete().eq('id', postId).eq('usuario', currentUser);
            if(!error) location.reload();
        }

        document.getElementById('file-input').onchange = (e) => {
            selectedFile = e.target.files[0];
            if(selectedFile){
                const url = URL.createObjectURL(selectedFile);
                document.getElementById('preview-box').innerHTML = selectedFile.type.includes('video') ? `<video src="${url}" autoplay muted loop style="width:100%; height:100%; object-fit:cover;"></video>` : `<img src="${url}" style="width:100%; height:100%; object-fit:cover;">`;
                showScreen('upload');
            }
        };

        async function startUpload() {
            if(!selectedFile || !currentUserId) return;
            document.getElementById('loading').style.display = 'flex';
            const fName = `${currentUserId}/${Date.now()}_${selectedFile.name.replace(/\s/g, '_')}`;
            const { error: storageError } = await _supabase.storage.from('mely_media').upload(fName, selectedFile);
            if(storageError) { document.getElementById('loading').style.display = 'none'; return showMessage("Error al subir archivo"); }
            const { data: urlData } = _supabase.storage.from('mely_media').getPublicUrl(fName);
            const { error: dbError } = await _supabase.from('publicaciones').insert([{ 
                usuario: currentUser, 
                url: urlData.publicUrl, 
                tipo: selectedFile.type.includes('video') ? 'video' : 'imagen', 
                descripcion: document.getElementById('post-desc').value, 
                estado: 'aprobado' 
            }]);
            document.getElementById('loading').style.display = 'none';
            if(!dbError) { showMessage("¡Publicado!"); showScreen('feed'); document.getElementById('post-desc').value = ""; selectedFile = null; }
        }

        function setupRealtime() {
            _supabase.channel('public')
            .on('postgres_changes', { event: 'INSERT', table: 'publicaciones' }, payload => {
                const newPost = payload.new;
                if(newPost.usuario !== currentUser && newPost.estado === 'aprobado') {
                    const container = document.getElementById('feed-container');
                    if(container.innerText.includes("ESTÁS AL DÍA")) container.innerHTML = "";
                    renderPost(newPost, container, true);
                    showMessage(`Nuevo post de @${newPost.usuario}`);
                }
            })
            .on('postgres_changes', { event: 'UPDATE', table: 'publicaciones' }, payload => {
                const post = payload.new;
                document.querySelectorAll(`#likes-${post.id}`).forEach(c => c.innerText = post.likes);
                document.querySelectorAll(`#vistas-${post.id}`).forEach(v => v.innerText = post.vistas);
            })
            // CAMBIO: NOTIFICACIONES EN TIEMPO REAL CON CONTADOR[cite: 11]
            .on('postgres_changes', { event: 'INSERT', table: 'likes' }, async payload => {
                const newLike = payload.new;
                const { data: post } = await _supabase.from('publicaciones').select('usuario').eq('id', newLike.post_id).maybeSingle();
                
                // Si el like es para mí y yo no lo envié, y no estoy viendo la bandeja
                if (post && post.usuario === currentUser && newLike.user_id !== currentUserId) {
                    if(document.getElementById('notifications-panel').style.display !== 'flex') {
                        unreadNotifications++;
                        const badge = document.getElementById('notif-count');
                        badge.innerText = unreadNotifications;
                        badge.style.display = 'flex';
                    }
                }
            }).subscribe();
        }

        init();
    </script>
</body>
</html>
