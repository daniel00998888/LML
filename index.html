<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA MELY | Global Scale Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        /* 1. RESET ULTRA-COMPATIBLE */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #0d0d0d;
            -webkit-text-size-adjust: 100%; /* Evita cambios de texto en iPhone horizontal */
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box !important; /* Prioridad máxima al cálculo de tamaño */
        }

        :root {
            --gold: #d4af37;
            --text: #ffffff;
        }

        body {
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 4vh 1rem;
            text-align: center;
            border-bottom: 2px solid var(--gold);
            background: #111;
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(2.5rem, 12vw, 6rem);
            color: var(--gold);
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* 2. CONTENEDOR CON DIMENSIONES FORZADAS */
        .carousel-wrapper {
            width: 90%;
            max-width: 1100px;
            margin: 2rem auto;
            position: relative;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            background: #000;
            border: 1px solid #222;
        }

        /* Fallback para navegadores que no escalan bien el aspect-ratio */
        @media screen and (min-width: 0px) {
            .carousel-track {
                display: flex;
                height: 100%;
                width: 100%;
                transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            }
        }

        .carousel-slide {
            min-width: 100% !important; /* Evita que el navegador la encoja */
            width: 100%;
            height: 100%;
            flex-shrink: 0; /* CRÍTICO: impide que la imagen se colapse en Safari/Brave */
            object-fit: cover;
            object-position: center;
            display: block;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.7);
            color: var(--gold);
            border: 1px solid var(--gold);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .prev { left: 10px; }
        .next { right: 10px; }

        @media (max-width: 600px) {
            .carousel-wrapper { aspect-ratio: 1 / 1; } /* Cuadrado en móvil */
            h1 { font-size: 15vw; letter-spacing: 2px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>LA MELY</h1>
    </header>

    <div class="carousel-wrapper">
        <div class="carousel-track" id="track">
            <img src="Sebas008.png" class="carousel-slide">
            <img src="sebas007.png" class="carousel-slide">
            <img src="cristian.png" class="carousel-slide">
            <img src="angel00.png" class="carousel-slide">
            <img src="iker007.png" class="carousel-slide">
        </div>

        <button class="nav-btn prev" id="prevBtn">&#10094;</button>
        <button class="nav-btn next" id="nextBtn">&#10095;</button>
    </div>

    <script>
        const track = document.getElementById('track');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        
        // Clonación dinámica (funciona sin importar cuántas fotos subas)
        const slides = document.querySelectorAll('.carousel-slide');
        const firstClone = slides[0].cloneNode(true);
        const lastClone = slides[slides.length - 1].cloneNode(true);
        
        track.appendChild(firstClone);
        track.insertBefore(lastClone, slides[0]);

        let index = 1;
        let isMoving = false;
        let autoPlay;

        // Forzamos posición inicial sin animar
        track.style.transition = "none";
        track.style.transform = `translateX(-100%)`;

        function move(dir) {
            if (isMoving) return;
            isMoving = true;
            index += dir;
            track.style.transition = "transform 0.6s ease-in-out";
            track.style.transform = `translateX(${-index * 100}%)`;
            resetTimer();
        }

        track.addEventListener('transitionend', () => {
            isMoving = false;
            if (index >= track.children.length - 1) {
                track.style.transition = "none";
                index = 1;
                track.style.transform = `translateX(-100%)`;
            } else if (index <= 0) {
                track.style.transition = "none";
                index = track.children.length - 2;
                track.style.transform = `translateX(${-index * 100}%)`;
            }
        });

        function startAuto() {
            autoPlay = setInterval(() => move(1), 3000);
        }

        function resetTimer() {
            clearInterval(autoPlay);
            clearTimeout(window.idle);
            window.idle = setTimeout(startAuto, 5000);
        }

        nextBtn.onclick = () => move(1);
        prevBtn.onclick = () => move(-1);

        // Iniciar sistema
        resetTimer();
    </script>
</body>
</html>
