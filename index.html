<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA MELY | TV</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Montserrat', sans-serif; }

        /* --- FIX SNAP SCROLL --- */
        #feed-container { 
            width: 100%; 
            height: 100vh; /* Altura total */
            height: 100dvh; 
            overflow-y: scroll; 
            snap-type: y mandatory; 
            scroll-snap-stop: always;
            scroll-behavior: smooth;
            scrollbar-width: none; 
        }
        #feed-container::-webkit-scrollbar { display: none; }

        .post-card { 
            width: 100%; 
            height: 100vh; 
            height: 100dvh; 
            snap-align: start; 
            snap-stop: always; 
            position: relative; 
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-player { width: 100%; height: 100%; object-fit: cover; }

        /* --- UI INFO --- */
        .ui-info { position: absolute; bottom: 85px; left: 15px; pointer-events: none; z-index: 10; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); }
        .ui-info h2 { font-family: 'Oswald'; color: #d4af37; font-size: 1.5rem; margin-bottom: 5px; }
        
        .status-icon { position: absolute; font-size: 4rem; color: rgba(255,255,255,0.5); opacity: 0; pointer-events: none; z-index: 15; transition: opacity 0.2s; }

        /* BARRA DE PROGRESO (TikTok Style) */
        .progress-container { position: absolute; bottom: 65px; width: 100%; height: 3px; background: rgba(255,255,255,0.2); z-index: 20; }
        .progress-bar { height: 100%; background: #d4af37; width: 0%; pointer-events: none; }
        .seek-input { position: absolute; top: -10px; width: 100%; height: 25px; opacity: 0; cursor: pointer; z-index: 21; }

        /* --- NAV --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: rgba(0,0,0,0.9); border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { text-align: center; color: #888; font-size: 10px; cursor: pointer; flex: 1; }
        .plus-btn { width: 45px; height: 30px; background: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; position: relative; margin: 0 auto; }
        .plus-btn::before { content:''; position:absolute; left:-3px; width:100%; height:100%; background:#20f3ea; border-radius:8px; z-index:-1; }
        .plus-btn::after { content:''; position:absolute; right:-3px; width:100%; height:100%; background:#ff0050; border-radius:8px; z-index:-1; }

        #auth-screen, #upload-screen { position: fixed; inset: 0; z-index: 2000; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .btn-main { width: 85%; max-width: 300px; padding: 15px; background: #d4af37; color: #000; border: none; border-radius: 50px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- PANTALLA AUTH -->
    <div id="auth-screen">
        <div style="font-family:'Oswald'; font-size:3.5rem; color:#d4af37; margin-bottom:20px;">LA MELY</div>
        <input type="email" id="email" placeholder="Correo" style="width:80%; padding:15px; margin-bottom:10px; border-radius:10px; background:#111; color:#fff; border:1px solid #333;">
        <input type="password" id="pass" placeholder="Contraseña" style="width:80%; padding:15px; margin-bottom:10px; border-radius:10px; background:#111; color:#fff; border:1px solid #333;">
        <button class="btn-main" onclick="handleAuth('login')">ENTRAR</button>
    </div>

    <!-- FEED -->
    <div id="feed-screen" style="display:none;">
        <div id="feed-container"></div>
        <div class="bottom-nav">
            <div class="nav-item" onclick="location.reload()"><i class="fas fa-home"></i></div>
            <div class="nav-item" onclick="document.getElementById('file-input').click()">
                <div class="plus-btn"><i class="fas fa-plus" style="color:#000"></i></div>
            </div>
            <div class="nav-item" onclick="logout()"><i class="fas fa-user"></i></div>
        </div>
    </div>

    <input type="file" id="file-input" accept="video/*,image/*" style="display:none">

    <script>
        const SB_URL = 'https://meiwuluwrdjszxeyoqtt.supabase.co';
        const SB_KEY = 'sb_publishable_gZgGIamNJqf8ir8vvt1OTw_bJ-rosi4';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;

        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                const { data } = await _supabase.from('perfiles').select('username').eq('id', session.user.id).single();
                currentUser = data ? data.username : "Anonimo";
                document.getElementById('feed-screen').style.display = 'block';
                await loadFeed();
                setupRealtime();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        }

        // --- REALTIME MEJORADO ---
        function setupRealtime() {
            _supabase.channel('public')
            .on('postgres_changes', { event: '*', table: 'publicaciones' }, (payload) => {
                // Si el admin aprobó un video nuevo o existente
                if (payload.new && payload.new.estado === 'aprobado') {
                    // Si ya existe en el feed, no lo duplicamos
                    if (!document.getElementById(`post-${payload.new.id}`)) {
                        renderPost(payload.new, true); // TRUE = VA HASTA ARRIBA
                    }
                }
            })
            .subscribe();
        }

        async function loadFeed() {
            const { data } = await _supabase.from('publicaciones')
                .select('*')
                .eq('estado', 'aprobado')
                .order('created_at', { ascending: false }); // RECIENTES PRIMERO
            
            const container = document.getElementById('feed-container');
            container.innerHTML = "";
            data?.forEach(post => renderPost(post, false));
            initObserver();
        }

        function renderPost(post, isNew) {
            const container = document.getElementById('feed-container');
            const card = document.createElement('div');
            card.className = 'post-card';
            card.id = `post-${post.id}`;
            card.innerHTML = `
                ${post.tipo === 'video' 
                    ? `<video class="video-player" src="${post.url}" loop playsinline></video>
                       <i class="fas fa-play status-icon"></i>
                       <div class="progress-container">
                           <div class="progress-bar" id="bar-${post.id}"></div>
                           <input type="range" class="seek-input" min="0" max="100" value="0" oninput="seekVideo(this, '${post.id}')">
                       </div>` 
                    : `<img class="video-player" src="${post.url}">`}
                <div class="ui-info">
                    <h2>@${post.usuario}</h2>
                    <p>${post.descripcion || ''}</p>
                </div>
            `;

            if (isNew) {
                container.prepend(card); // Poner al inicio de la lista
                container.scrollTop = 0; // Scrollear hasta arriba para ver lo nuevo
            } else {
                container.appendChild(card);
            }

            if (post.tipo === 'video') setupVideoControls(card);
        }

        function setupVideoControls(card) {
            const video = card.querySelector('video');
            const icon = card.querySelector('.status-icon');
            const bar = card.querySelector('.progress-bar');
            const range = card.querySelector('.seek-input');

            video.onclick = () => {
                if (video.paused) {
                    video.play();
                    icon.className = "fas fa-play status-icon";
                } else {
                    video.pause();
                    icon.className = "fas fa-pause status-icon";
                }
                icon.style.opacity = "1";
                setTimeout(() => icon.style.opacity = "0", 400);
            };

            video.ontimeupdate = () => {
                const p = (video.currentTime / video.duration) * 100;
                bar.style.width = p + "%";
                range.value = p;
            };
        }

        window.seekVideo = (el, id) => {
            const v = document.querySelector(`#post-${id} video`);
            if(v) v.currentTime = (el.value / 100) * v.duration;
        };

        function initObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const v = entry.target.querySelector('video');
                    if (v) {
                        if (entry.isIntersecting) v.play();
                        else { v.pause(); v.currentTime = 0; }
                    }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.post-card').forEach(c => obs.observe(c));
        }

        async function handleAuth(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            const { error } = await _supabase.auth.signInWithPassword({ email: e, password: p });
            if (error) alert("Error"); else location.reload();
        }

        async function logout() { await _supabase.auth.signOut(); location.reload(); }

        init();
    </script>
</body>
</html>
